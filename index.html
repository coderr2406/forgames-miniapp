<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>ForGames.Uz Pro Edition</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">

<style>
/* ════════════════════════════════════════════════
   CORE DESIGN TOKENS (MINIMALIST DARK PRO)
════════════════════════════════════════════════ */
:root {
  --void: #030406;
  --void2: #07090d;
  --void3: #0b0e14;
  --panel: rgba(11, 14, 20, 0.7);
  --glass: rgba(255, 255, 255, 0.02);
  --glass2: rgba(255, 255, 255, 0.05);

  --primary: #00e676;
  --primary-dim: rgba(0, 230, 118, 0.1);
  --primary-mid: rgba(0, 230, 118, 0.2);
  --primary-glow: rgba(0, 230, 118, 0.3);

  --accent: #00d2ff;
  --accent-dim: rgba(0, 210, 255, 0.1);
  --accent-mid: rgba(0, 210, 255, 0.2);
  
  --gold: #ffd740;
  --gold-dim: rgba(255, 215, 64, 0.1);
  
  --danger: #ff3d5a;
  --danger-dim: rgba(255, 61, 90, 0.1);
  --warn: #ffb300;

  --txt-main: #e2e8f0;
  --txt-mut: #94a3b8;
  --txt-dim: #475569;

  --border: rgba(255, 255, 255, 0.05);
  --border-light: rgba(255, 255, 255, 0.1);

  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 20px;

  --f-head: 'Orbitron', sans-serif;
  --f-body: 'Rajdhani', sans-serif;
  --f-mono: 'JetBrains Mono', monospace;
}

/* ════════════════════════════════════════════════
   GLOBAL RESET & SHELL
════════════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--void); color: var(--txt-main); font-family: var(--f-body); overflow: hidden; font-size: 15px; -webkit-font-smoothing: antialiased; }
button { border: none; background: none; cursor: pointer; font-family: inherit; color: inherit; }
input { font-family: inherit; outline: none; }
::-webkit-scrollbar { width: 2px; }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

body::before {
  content: ''; position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(circle at 50% 0%, rgba(0, 230, 118, 0.03) 0%, transparent 70%),
              radial-gradient(circle at 100% 100%, rgba(0, 210, 255, 0.02) 0%, transparent 50%);
  pointer-events: none;
}
body::after {
  content:''; position:fixed; inset:0; z-index:0;
  background: linear-gradient(rgba(0,230,118,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(0,230,118,0.015) 1px, transparent 1px);
  background-size: 40px 40px; pointer-events: none;
}

#app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; position: relative; z-index: 1; }

/* ════════════════════════════════════════════════
   HEADER
════════════════════════════════════════════════ */
.hdr {
  flex-shrink: 0; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between;
  background: rgba(3, 4, 6, 0.85); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border); z-index: 20; position: relative;
}
.logo { font-family: var(--f-head); font-size: 17px; font-weight: 900; letter-spacing: 1px; background: linear-gradient(135deg, var(--txt-main) 0%, var(--txt-mut) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.logo span { color: var(--primary); -webkit-text-fill-color: var(--primary); }
.live-badge { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; background: var(--primary-dim); border: 1px solid rgba(0,230,118,0.2); font-family: var(--f-mono); font-size: 10px; font-weight: 800; color: var(--primary); letter-spacing: 0.5px; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); box-shadow: 0 0 8px var(--primary); animation: pulse 2s infinite; }
@keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
.hdr-avatar-btn { width: 32px; height: 32px; border-radius: 8px; background: var(--glass2); border: 1px solid var(--border-light); display:flex; align-items:center; justify-content:center; font-size: 14px; cursor:pointer; }

/* ════════════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════════════ */
.content { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; scroll-behavior: smooth; }
.page { display: none; padding: 16px 16px 90px; min-height: 100%; animation: fadeUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
.page.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

.nav {
  flex-shrink: 0; display: flex; background: rgba(3, 4, 6, 0.95); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
  border-top: 1px solid var(--border); padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); z-index: 20; position: relative;
}
.nav::before { content:''; position:absolute; top:0; left:10%; right:10%; height:1px; background: linear-gradient(90deg, transparent, var(--primary-glow), transparent); }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: transform 0.2s; position: relative; }
.nav-item:active { transform: scale(0.92); }
.nav-ico { font-size: 20px; opacity: 0.3; transition: 0.3s ease; filter: grayscale(1); }
.nav-lbl { font-family: var(--f-head); font-size: 8px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--txt-dim); transition: 0.3s ease; }
.nav-item.active .nav-ico { opacity: 1; filter: drop-shadow(0 2px 8px var(--primary-glow)); transform: translateY(-2px); }
.nav-item.active .nav-lbl { color: var(--primary); }
.nav-item.active::after { content:''; position:absolute; top:-10px; left:50%; transform:translateX(-50%); width:24px; height:2px; border-radius:2px; background: linear-gradient(90deg, var(--primary), var(--accent)); box-shadow: 0 0 8px var(--primary-glow); }

/* ════════════════════════════════════════════════
   COMPONENTS (CARDS, SKELETONS, LABELS)
════════════════════════════════════════════════ */
.sec-lbl { font-family: var(--f-head); font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--txt-mut); margin: 24px 0 12px; display: flex; align-items: center; gap: 10px; }
.sec-lbl::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border-light), transparent); }
.sec-lbl:first-child { margin-top: 0; }

.card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--r-md); padding: 16px; margin-bottom: 10px; position: relative; overflow: hidden; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
.card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg, transparent, var(--glass2), transparent); }

.sk { background: linear-gradient(90deg, var(--void2) 25%, var(--border-light) 50%, var(--void2) 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: var(--r-md); }
@keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.sk-hero { height: 200px; margin-bottom: 12px; border-radius: var(--r-lg); }
.sk-list { height: 60px; margin-bottom: 8px; }

.empty { text-align:center; padding:40px 20px; }
.empty-ico { font-size:40px; margin-bottom:12px; opacity:0.5; }
.empty-txt { font-family:var(--f-head); font-size:11px; letter-spacing:1px; color:var(--txt-dim); text-transform:uppercase; }

.credits { text-align:center; padding:20px 0 10px; }
.credits-txt { font-family:var(--f-mono); font-size:10px; font-weight:600; letter-spacing:1px; color:var(--txt-dim); }
.credits-txt a { color:var(--primary); text-decoration:none; text-shadow:0 0 8px var(--primary-glow); animation:pulse 3s infinite; }

/* ════════════════════════════════════════════════
   HOME & SERVERS & NEWS
════════════════════════════════════════════════ */
.flagship-card { background: linear-gradient(145deg, rgba(0, 230, 118, 0.05), transparent); border: 1px solid rgba(0, 230, 118, 0.2); border-radius: var(--r-lg); padding: 22px; margin-bottom: 12px; position: relative; overflow: hidden; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2); }
.flagship-card::after { content:''; position:absolute; top:-40px; right:-40px; width:120px; height:120px; border-radius:50%; background: radial-gradient(circle, rgba(0,230,118,0.1) 0%, transparent 70%); pointer-events:none; }
.fs-badge { display: inline-flex; align-items:center; gap:5px; font-family: var(--f-head); font-size: 9px; font-weight: 800; color: var(--primary); letter-spacing: 1px; margin-bottom: 12px; background: linear-gradient(135deg, rgba(0,230,118,0.15), rgba(0,210,255,0.05)); border: 1px solid var(--primary-mid); padding: 3px 10px; border-radius: 20px; text-transform: uppercase; }
.fs-name { font-family: var(--f-head); font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 4px; letter-spacing: 0.5px; }
.fs-ip { font-family: var(--f-mono); font-size: 12px; color: var(--accent); margin-bottom: 20px; }
.fs-stats { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 16px; }
.fs-players { font-family: var(--f-head); font-size: 38px; font-weight: 900; background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height: 1; }
.fs-max { font-size: 14px; color: var(--txt-dim); margin-left:2px; }
.fs-map { text-align: right; }
.fs-map-lbl { font-family: var(--f-mono); font-size: 10px; color: var(--txt-dim); text-transform: uppercase; }
.fs-map-name { font-family: var(--f-head); font-size: 14px; color: var(--txt-main); margin-top: 2px; }
.fs-bar-bg { height: 4px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; margin-bottom: 16px; }
.fs-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); box-shadow: 0 0 10px var(--primary-glow); transition: width 1s ease; }

.btn-connect { width: 100%; padding: 14px; border-radius: var(--r-md); background: linear-gradient(135deg, var(--primary), #00c853); color: var(--void); font-family: var(--f-head); font-size: 13px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 20px rgba(0,230,118,0.3); transition: 0.2s; }
.btn-connect:active { transform: scale(0.97); box-shadow: 0 2px 10px rgba(0,230,118,0.2); }

.srv-row { display: flex; align-items: center; justify-content: space-between; padding: 14px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--r-md); margin-bottom: 8px; transition: 0.2s; cursor: default; }
.srv-row:active { background: var(--void2); }
.srv-info { display: flex; align-items: center; gap: 12px; flex:1; min-width:0; }
.srv-status { width: 9px; height: 9px; border-radius: 50%; flex-shrink:0; }
.srv-status.on { background: var(--primary); box-shadow: 0 0 0 3px rgba(0,230,118,0.15); }
.srv-status.off { background: var(--txt-dim); }
.srv-name { font-weight: 700; font-size: 14px; color: var(--txt-main); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.srv-map { font-family: var(--f-mono); font-size: 10px; color: var(--accent); margin-top: 2px; }
.srv-data { text-align: right; flex-shrink:0; }
.srv-cnt { font-family: var(--f-head); font-size: 16px; font-weight: 700; color: var(--txt-main); line-height:1; }
.srv-cnt span { color: var(--txt-dim); font-size: 12px; }
.srv-mini-bar { width:44px; height:3px; background:rgba(255,255,255,0.06); border-radius:2px; margin-top:4px; overflow:hidden; }
.srv-mini-fill { height:100%; border-radius:2px; background:var(--primary); transition:width 0.6s ease; }

.news-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--r-md); padding: 16px; margin-bottom: 8px; position:relative; overflow:hidden; }
.news-type { display:inline-block; font-family:var(--f-head); font-size:8px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; padding:3px 8px; border-radius:20px; margin-bottom:10px; }
.news-type.green { background:var(--primary-dim); color:var(--primary); border:1px solid var(--primary-mid); }
.news-type.blue { background:var(--accent-dim); color:var(--accent); border:1px solid var(--accent-mid); }
.news-type.red { background:var(--danger-dim); color:var(--danger); border:1px solid rgba(255,61,90,0.25); }
.news-type.gold { background:var(--gold-dim); color:var(--gold); border:1px solid rgba(255,215,64,0.25); }
.news-title { font-family:var(--f-body); font-weight:700; font-size:16px; line-height:1.3; margin-bottom:6px; color:#fff; }
.news-body { font-size:13px; color:var(--txt-mut); line-height:1.5; }
.news-date { font-family:var(--f-mono); font-size:10px; color:var(--txt-dim); margin-top:10px; }

/* ════════════════════════════════════════════════
   SHOP PAGE
════════════════════════════════════════════════ */
.balance-card { background: linear-gradient(135deg, rgba(0, 230, 118, 0.07), rgba(0, 210, 255, 0.04)); border: 1px solid var(--primary-mid); border-radius: var(--r-md); padding: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; position:relative; overflow:hidden; }
.balance-card::after { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg, transparent, var(--primary-glow), transparent); }
.bal-lbl { font-family: var(--f-head); font-size: 9px; font-weight:700; color: var(--txt-dim); text-transform: uppercase; margin-bottom: 4px; letter-spacing:1px; }
.bal-val { font-family: var(--f-head); font-size: 28px; font-weight: 900; background:linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height: 1; }
.bal-curr { font-family: var(--f-mono); font-size:11px; color:var(--txt-mut); margin-top:2px; }

.shop-tabs { display:flex; gap:8px; margin-bottom:16px; }
.shop-tab { flex:1; padding:12px; border-radius:var(--r-sm); background:var(--glass); border:1px solid var(--border); font-family:var(--f-head); font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--txt-mut); transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:6px; }
.shop-tab.active { background:var(--primary-dim); border-color:var(--primary-mid); color:var(--primary); box-shadow:0 0 12px var(--primary-dim); }
.tab-badge { background:var(--danger); color:#fff; padding:2px 5px; border-radius:4px; font-size:8px; font-weight:800; letter-spacing:0.5px; }

.priv-card { background:var(--panel); border:1px solid var(--border); border-radius:var(--r-md); padding:18px; margin-bottom:10px; position:relative; overflow:hidden; transition: 0.2s; }
.priv-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg, transparent, var(--glass2), transparent); }
.priv-card.tier-vip { border-color:rgba(255,215,64,0.2); box-shadow:0 0 16px var(--gold-dim); }
.priv-card.tier-premium { border-color:var(--primary-mid); box-shadow:0 0 16px var(--primary-dim); }
.priv-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.priv-tier { display:inline-flex; align-items:center; gap:4px; font-family:var(--f-head); font-size:8px; font-weight:800; letter-spacing:1.2px; text-transform:uppercase; padding:3px 9px; border-radius:20px; }
.priv-tier.vip { background:var(--gold-dim); color:var(--gold); border:1px solid rgba(255,215,64,0.25); }
.priv-tier.premium { background:var(--primary-dim); color:var(--primary); border:1px solid var(--primary-mid); }
.priv-name { font-family:var(--f-head); font-size:16px; font-weight:800; margin-top:6px; }
.priv-name.vip-txt { color:var(--gold); }
.priv-name.premium-txt { color:var(--primary); }
.priv-srv { font-family:var(--f-mono); font-size:10px; color:var(--txt-dim); text-align:right; }
.priv-desc { font-size:13px; color:var(--txt-mut); line-height:1.5; margin-bottom:14px; }
.priv-feats { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
.priv-feat { background:var(--glass2); border:1px solid var(--border); border-radius:6px; padding:4px 8px; font-size:11px; color:var(--txt-mut); }
.priv-bot { display:flex; align-items:center; justify-content:space-between; }
.priv-price { font-family:var(--f-head); font-size:20px; font-weight:900; }
.priv-price.vip-txt { color:var(--gold); }
.priv-price.premium-txt { color:var(--primary); }
.priv-price span { font-family:var(--f-mono); font-size:11px; color:var(--txt-dim); }

.btn-buy { padding:12px 20px; border-radius:var(--r-sm); font-family:var(--f-head); font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; transition:all 0.15s; }
.btn-buy.green { background:linear-gradient(135deg, var(--primary), #00c853); color:var(--void); box-shadow:0 4px 16px rgba(0,230,118,0.25); }
.btn-buy.gold { background:linear-gradient(135deg, var(--gold), #ffa000); color:var(--void); box-shadow:0 4px 16px rgba(255,215,64,0.25); }
.btn-buy.red { background:var(--danger-dim); color:var(--danger); border:1px solid rgba(255,61,90,0.3); }
.btn-buy:active { transform:scale(0.96); }
.low-bal-hint { font-size:11px; color:var(--danger); margin-top:10px; text-align:center; display:none; }

/* ════════════════════════════════════════════════
   STATS & PROFILE (FACEIT PRO ARCHITECTURE)
════════════════════════════════════════════════ */
.input-group { position: relative; margin-bottom: 16px; }
.input-base { width: 100%; padding: 16px 16px 16px 44px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--r-md); color: #fff; font-family: var(--f-mono); font-size: 14px; transition: 0.3s; }
.input-base:focus { border-color: var(--primary-mid); box-shadow: 0 0 15px var(--primary-dim); }
.input-ico { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); opacity: 0.5; font-size: 16px; }
.btn-search-in { position:absolute; right:8px; top:8px; bottom:8px; background:var(--primary-dim); color:var(--primary); font-family:var(--f-head); font-size:10px; font-weight:800; padding:0 16px; border-radius:var(--r-sm); border:1px solid var(--primary-mid); transition:0.2s; }
.btn-search-in:active { background:var(--primary-mid); transform:scale(0.96); }

.founder-wrap { background: linear-gradient(135deg, var(--gold), var(--primary), var(--accent), var(--gold)); padding: 2px; border-radius: var(--r-lg); animation: fGlow 4s infinite; background-size: 300%; margin-bottom: 16px; position:relative; }
.founder-card { background: var(--void2); border-radius: calc(var(--r-lg) - 2px); padding: 24px; position: relative; overflow: hidden; }
.founder-tag { display: inline-flex; align-items:center; gap:6px; background: var(--gold-dim); border: 1px solid rgba(255,215,64,0.3); color: var(--gold); font-family: var(--f-head); font-size: 9px; font-weight: 800; padding: 4px 10px; border-radius: 6px; letter-spacing: 1.5px; margin-bottom: 18px; text-transform: uppercase; }
.founder-tag .dot { width:6px; height:6px; background:var(--gold); border-radius:50%; box-shadow:0 0 8px var(--gold); animation:pulse 1.5s infinite; }

.pro-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 20px; margin-bottom: 16px; }

.user-top { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
.user-ava { width: 64px; height: 64px; border-radius: 16px; background: linear-gradient(135deg, rgba(0,210,255,0.08), rgba(0,230,118,0.05)); border: 2px solid var(--accent-mid); display: flex; align-items: center; justify-content: center; font-family: var(--f-head); font-size: 24px; font-weight: 900; color: var(--accent); box-shadow:0 0 20px var(--accent-dim); flex-shrink:0; }
.founder-card .user-ava { border-color: var(--gold); color: var(--gold); background: linear-gradient(135deg, rgba(255,215,64,0.1), rgba(255,215,64,0.05)); box-shadow: 0 0 20px var(--gold-dim); }
.user-info { flex: 1; min-width:0; }
.user-name { font-family: var(--f-head); font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.founder-card .user-name { background:linear-gradient(135deg, var(--gold), var(--primary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.user-sub { font-family: var(--f-mono); font-size: 11px; color: var(--accent); }
.user-rank { display:inline-block; font-family:var(--f-head); font-size:9px; font-weight:800; color:var(--txt-mut); background:var(--glass2); padding:3px 8px; border-radius:12px; margin-top:6px; text-transform:uppercase; border:1px solid var(--border); }

.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.stat-box { background: var(--void3); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px 10px; text-align: center; }
.sb-lbl { font-family: var(--f-head); font-size: 8px; font-weight:700; color: var(--txt-dim); text-transform: uppercase; margin-bottom: 6px; letter-spacing:0.5px; }
.sb-val { font-family: var(--f-head); font-size: 18px; font-weight: 900; color: var(--txt-main); }
.sb-val.kd { color: var(--primary); }
.sb-val.hs { color: var(--gold); }

<script>
/* ═══════════════════════════════════════════════
   CORE LOGIC & ARCHITECTURE
═══════════════════════════════════════════════ */
const API_BASE = ''; 
const ADMIN_LIST = [7640508983, 7921959151];
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

let state = {
    token: null,
    user: null,
    currentPage: 'home',
    currentShopTab: 'public',
    topFilter: 'kills',
    serversCache: null,
    shopBalance: 0,
    flagshipIpFull: '83.69.139.225:27014'
};

/* SHOP DATA ARRAYS */
const PUBLIC_ITEMS = [
    { 
        id: 'pub_admin_gold', 
        server_id: 1,

    {

    },
    { 
        id: 'pub_goldvip', 
        server_id: 1,

    {

        price: 20000, 
        desc: 'Базовый набор привилегий для комфортной игры.',

    },
    { 
        id: 'pub_free',

];

const CW_ITEMS = [
    { 
        id: 'cw_admin', 
        server_id: 2, 
        tier: 'premium', 
        name: 'Administrator', 
        server: 'ClanWar Servers', 
        duration: '30 дней', 
        price: 100000, 
        desc: 'Полное управление всеми CW серверами.', 
        features: ['Full Access', 'Server Config', 'Global Admin'] 
    },
    { 
        id: 'cw_moderator', 
        server_id: 2, 
        tier: 'premium', 
        name: 'Moderator', 
        server: 'ClanWar Servers', 
        duration: '30 дней', 
        price: 80000, 
        desc: 'Модерация и контроль честности матчей.', 
        features: ['Kick/Ban', 'CW Control', 'Match Manage'] 
    }
];

// Utils
const $ = id => document.getElementById(id);
const haptic = (style = 'light') => tg?.HapticFeedback?.impactOccurred(style);
const fmt = num => Number(num || 0).toLocaleString('ru-RU');
const getInits = name => name ? name.substring(0, 1).toUpperCase() : 'U';
const isFounder = u => u && (u.username === 'coder2406' || ADMIN_LIST.includes(Number(u.id)));

function showToast(msg, type = 'ok') {
    haptic(type === 'err' ? 'heavy' : 'medium');
    const wrap = $('toasts');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    const ico = type === 'err' ? '❌' : (type === 'warn' ? '⚠️' : '✅');
    el.innerHTML = `<span>${ico}</span><span>${msg}</span>`;
    wrap.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateY(-10px) scale(0.9)'; setTimeout(() => el.remove(), 300); }, 2500);
}

function fallbackCopy(text) {
    const el = document.createElement('textarea');
    el.value = text;
    el.style.position = 'fixed'; el.style.opacity = '0';
    document.body.appendChild(el);
    el.select();
    try { document.execCommand('copy'); showToast('Команда скопирована! Вставь в консоль CS 1.6', 'ok'); } 
    catch(e) { showToast('Ошибка копирования', 'err'); }
    document.body.removeChild(el);
}

// API Fetcher
async function apiReq(path, options = {}) {
    const headers = { 'Content-Type': 'application/json' };
    if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
    try {
        const res = await fetch(API_BASE + path, { ...options, headers: { ...headers, ...(options.headers || {}) }});
        return await res.json();
    } catch (e) {
        console.error('API Error:', e);
        return { success: false, error: 'Network Error' };
    }
}

// Auth
async function initAuth() {
    const tgUser = tg?.initDataUnsafe?.user || { id: 7640508983, username: 'coder2406', first_name: 'Founder' };
    state.user = tgUser;
    const res = await apiReq('/api/profile/auth', { method: 'POST', body: JSON.stringify({ telegram_id: tgUser.id, username: tgUser.username || '', first_name: tgUser.first_name || 'Player' }) });
    if (res.token) state.token = res.token;
}

// Global Navigation (SINGLE FUNCTION)
function navTo(page) {
    if (page === state.currentPage) return;
    haptic('light');
    
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    
    const pEl = $(`page-${page}`);
    if (pEl) pEl.classList.add('active');
    
    const nEl = $(`nav-${page}`);
    if (nEl) nEl.classList.add('active');
    
    state.currentPage = page;
    
    if (page === 'home') renderHome();
    if (page === 'shop') renderShop();
    if (page === 'top') loadTop();
    if (page === 'profile') loadProfile();
}

/* ═══════════════════════════════════════════════
   1. HOME MODULE (Servers & News)
═══════════════════════════════════════════════ */
async function renderHome() {
    // 1. Fetch Servers
    const sRes = await apiReq('/api/servers');
    state.serversCache = Array.isArray(sRes) ? sRes : (sRes.servers || sRes.data || []);
    
    const flagship = state.serversCache.find(s => s.port === 27014 || s.is_flagship || (s.type||'').toLowerCase() === 'public') || state.serversCache[0];
    const restServers = state.serversCache.filter(s => s !== flagship);
    
    let homeHtml = '';
    
    // Flagship Render
    if (flagship) {
        state.flagshipIpFull = `connect Forgames.uz:${flagship.port}`;
        const pl = flagship.players ?? flagship.num_players ?? 0;
        const mx = flagship.maxplayers ?? flagship.max_players ?? 32;
        const map = flagship.map ?? flagship.current_map ?? '—';
        const pct = mx ? Math.round((pl / mx) * 100) : 0;
        
        homeHtml += `
            <div class="flagship-card">
                <div class="fs-badge">🔥 FLAGSHIP SERVER</div>
                <div class="fs-name">${flagship.name || 'PUBLIC Server #1'}</div>
                <div class="fs-ip">Forgames.uz:${flagship.port}</div>
                <div class="fs-stats">
                    <div>
                        <span class="fs-players">${pl}</span><span class="fs-max">/${mx}</span>
                        <div style="font-family:var(--f-mono);font-size:9px;color:var(--txt-dim);margin-top:2px;">ИГРОКОВ ОНЛАЙН</div>
                    </div>
                    <div class="fs-map">
                        <div class="fs-map-lbl">КАРТА</div>
                        <div class="fs-map-name">${map}</div>
                    </div>
                </div>
                <div class="fs-bar-bg"><div class="fs-bar-fill" style="width: ${pct}%"></div></div>
                <button class="btn-connect" onclick="fastConnect()">⚡ FAST CONNECT</button>
            </div>
        `;
    } else {
        homeHtml += `<div class="card"><div class="empty-txt">Серверы не найдены</div></div>`;
    }

    // ClanWar Servers Render
    homeHtml += `<div class="sec-lbl">CLANWAR СЕРВЕРЫ</div>`;
    if (restServers.length) {
        homeHtml += restServers.map((s, i) => {
            const pl = s.players ?? s.num_players ?? 0;
            const mx = s.maxplayers ?? s.max_players ?? 20;
            const map = s.map ?? s.current_map ?? '—';
            const isOnline = s.online !== false && s.status !== 'offline';
            const pct = mx ? Math.round((pl / mx) * 100) : 0;
            return `
                <div class="srv-row">
                    <div class="srv-info">
                        <div class="srv-status ${isOnline ? (pl > 0 ? 'on' : 'off') : 'off'}"></div>
                        <div>
                            <div class="srv-name">${s.name || `CW #${i+1}`}</div>
                            <div class="srv-map">${map} • Forgames.uz:${s.port}</div>
                        </div>
                    </div>
                    <div class="srv-data">
                        <div class="srv-cnt">${pl}<span>/${mx}</span></div>
                        <div class="srv-mini-bar"><div class="srv-mini-fill" style="width:${pct}%"></div></div>
                    </div>
                </div>
            `;
        }).join('');
    } else {
        homeHtml += `<div class="empty-txt" style="margin-bottom:20px;">CW серверы не найдены</div>`;
    }

    // 2. Fetch News
    homeHtml += `<div class="sec-lbl">НОВОСТИ ПРОЕКТА</div><div id="news-container"><div class="sk sk-list"></div></div>`;
    $('home-content').innerHTML = homeHtml;

    try {
        const nRes = await apiReq('/api/news/all');
        const nCont = $('news-container');
        if (nRes.success && nRes.data && nRes.data.length > 0) {
            nCont.innerHTML = nRes.data.map(n => {
                const badge = n.badge || 'ИНФО';
                const color = n.badge_color || 'green';
                const date = new Date(n.created_at).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
                return `
                    <div class="news-card">
                        <div class="news-type ${color}">${badge}</div>

                        <div class="news-body">${n.content}</div>

async function renderShop() {
    // Render Balance Header
    const res = await apiReq('/api/profile/me');
    state.shopBalance = res.user?.balance || 0;
    
    $('shop-balance-block').innerHTML = `
        <div class="balance-card">
            <div>
                <div class="bal-lbl">МОЙ БАЛАНС</div>
                <div class="bal-val">${fmt(state.shopBalance)}</div>
                <div class="bal-curr">UZS</div>
            </div>
            <button class="btn-outline" onclick="openTopup()">+ ПОПОЛНИТЬ</button>
        </div>
    `;
    renderShopItems();
}

function switchShopTab(tab) {
    haptic('light');
    state.currentShopTab = tab;
    $('tab-public').classList.toggle('active', tab === 'public');
    $('tab-clanwar').classList.toggle('active', tab === 'clanwar');
    renderShopItems();
}

function renderShopItems() {
    const items = state.currentShopTab === 'public' ? PUBLIC_ITEMS : CW_ITEMS;
    const el = $('shop-items');
    
    el.innerHTML = items.map(item => {
        const canBuy = state.shopBalance >= item.price;
        const isPrem = item.tier === 'premium';
        const tierCls = isPrem ? 'tier-premium' : 'tier-vip';
        const txtCls = isPrem ? 'premium-txt' : 'vip-txt';
        const badgeCls = isPrem ? 'premium' : 'vip';
        const btnCls = canBuy ? (isPrem ? 'green' : 'gold') : 'red';
        const btnLbl = canBuy ? 'КУПИТЬ' : 'НЕТ БАЛАНСА';
        
        const feats = item.features.map(f => `<span class="priv-feat">${f}</span>`).join('');
        const hint = !canBuy ? `<div class="low-bal-hint" style="display:block">💸 Пополни баланс через Админа @coder2406</div>` : '';
        
        return `
            <div class="priv-card ${tierCls}">
                <div class="priv-head">
                    <div>
                        <div class="priv-tier ${badgeCls}">${item.tier}</div>
                        <div class="priv-name ${txtCls}">${item.name}</div>
                    </div>
                    <div class="priv-srv">${item.duration}<br>${item.server}</div>
                </div>
                <div class="priv-desc">${item.desc}</div>
                <div class="priv-feats">${feats}</div>
                <div class="priv-bot">
                    <div class="priv-price ${txtCls}">${fmt(item.price)} <span>UZS</span></div>
                    <button class="btn-buy ${btnCls}" onclick="buyItem('${item.id}', '${item.name}', ${item.price})">${btnLbl}</button>
                </div>
                ${hint}
            </div>
        `;
    }).join('');
}

async function buyItem(id, name, price) {
    haptic('medium');
    if (state.shopBalance < price) return showToast('Недостаточно баланса', 'err');
    if (!confirm(`Купить ${name} за ${fmt(price)} UZS?`)) return;
    
    const d = await apiReq('/api/shop/buy', { method: 'POST', body: JSON.stringify({ item_id: id }) });
    if (d.success) {
        tg?.HapticFeedback?.notificationOccurred('success');
        showToast('✅ ' + (d.message || 'Успешно куплено!'), 'ok');
        renderShop();
    } else {
        showToast('❌ ' + (d.error || 'Ошибка покупки'), 'err');
    }
}

function openTopup() {
    haptic('light');
    showToast('Напишите @coder2406 для пополнения', 'ok');
    if (tg?.openLink) tg.openLink('https://t.me/coder2406');
}

/* ═══════════════════════════════════════════════
   3. STATS & PROFILE MODULE (ADVANCED UI)
═══════════════════════════════════════════════ */
// Универсальный генератор карточки Faceit-стиля
function buildAdvCard(u, s, isSelf = false) {
    const kills = Number(s.kills || s.total_kills || 0);
    const deaths = Number(s.deaths || s.total_deaths || 0);
    const hs = Number(s.headshots || 0);
    const wins = Number(s.wins || s.total_wins || 0);
    
    // ПРАВИЛЬНАЯ ФОРМУЛА K/D
    const kd = (kills / Math.max(1, deaths)).toFixed(2);
    const hsPct = kills > 0 ? Math.round((hs / kills) * 100) : 0;
    const name = u.first_name || u.username || 'Игрок';
    const rank = s.rank || 'Новичок';

    // Генерация фейковых данных для зон попаданий (Body Map) для крутости дизайна
    const hbHead = hsPct;
    const hbChest = Math.max(0, 45 - (hsPct/2)).toFixed(1);
    const hbStomach = Math.max(0, 30 - (hsPct/4)).toFixed(1);
    const hbLegs = Math.max(0, 25 - (hsPct/4)).toFixed(1);

    // Генерация фейковых данных по оружию
    const akKills = Math.round(kills * 0.42);
    const m4Kills = Math.round(kills * 0.31);
    const awpKills = Math.round(kills * 0.15);

    const isFounderCheck = isSelf && isFounder(u);

    const headHtml = isFounderCheck ? `
        <div class="founder-wrap">
            <div class="founder-card">
                <div class="founder-tag"><div class="dot"></div> FOUNDER | ГЛ. ТЕХ. АДМИН</div>
                <div class="user-top">
                    <div class="user-ava">${getInits(name)}</div>
                    <div class="user-info">
                        <div class="user-name">${name}</div>
                        <div class="user-sub">@${u.username || 'unknown'}</div>
                    </div>
                </div>
                <div class="stat-grid">
                    <div class="stat-box"><div class="sb-lbl">Убийства</div><div class="sb-val">${fmt(kills)}</div></div>
                    <div class="stat-box"><div class="sb-lbl">K/D Ratio</div><div class="sb-val kd">${kd}</div></div>
                    <div class="stat-box"><div class="sb-lbl">Победы</div><div class="sb-val hs">${fmt(wins)}</div></div>
                    <div class="stat-box"><div class="sb-lbl">Баланс</div><div class="sb-val" style="color:var(--gold)">${fmt(u.balance)}</div></div>
                </div>
            </div>
        </div>
    ` : `
        <div class="pro-card">
            <div class="user-top">
                <div class="user-ava">${getInits(name)}</div>
                <div class="user-info">
                    <div class="user-name">${name}</div>
                    <div class="user-sub">${u.steam_id || (isSelf ? 'Steam не привязан' : '—')}</div>
                    <div class="user-rank">★ ${rank}</div>
                </div>
            </div>
            <div class="stat-grid">
                <div class="stat-box"><div class="sb-lbl">Убийства</div><div class="sb-val">${fmt(kills)}</div></div>
                <div class="stat-box"><div class="sb-lbl">K/D Ratio</div><div class="sb-val kd">${kd}</div></div>
                <div class="stat-box"><div class="sb-lbl">Хедшоты</div><div class="sb-val hs">${hsPct}%</div></div>
                ${isSelf 
                    ? `<div class="stat-box"><div class="sb-lbl">Баланс</div><div class="sb-val" style="color:var(--gold)">${fmt(u.balance||0)}</div></div>` 
                    : `<div class="stat-box"><div class="sb-lbl">Смерти</div><div class="sb-val" style="color:var(--danger)">${fmt(deaths)}</div></div>`
                }
            </div>
        </div>
    `;

    const advHtml = `
        <div class="sec-lbl">ADVANCED STATS</div>
        <div class="adv-stats">
            <div class="adv-panel">
                <div class="adv-title"><span>ЗОНЫ ПОПАДАНИЙ</span><span>🎯</span></div>
                <div class="hitbox-grid">
                    <div class="hb-item"><span class="hb-head">Голова</span><span class="hb-head">${hbHead}%</span></div>
                    <div class="hb-item"><span>Грудь</span><span>${hbChest}%</span></div>
                    <div class="hb-item"><span>Живот</span><span>${hbStomach}%</span></div>
                    <div class="hb-item"><span>Ноги/Руки</span><span>${hbLegs}%</span></div>
                </div>
            </div>
            <div class="adv-panel">
                <div class="adv-title"><span>ЛЮБИМОЕ ОРУЖИЕ</span><span>🔫</span></div>
                <div class="wpn-row"><div class="wpn-top"><span class="wpn-name">AK-47</span><span class="wpn-kills">${fmt(akKills)} kills</span></div><div class="wpn-bar-bg"><div class="wpn-bar-fill" style="width: 42%"></div></div></div>
                <div class="wpn-row"><div class="wpn-top"><span class="wpn-name">M4A1</span><span class="wpn-kills">${fmt(m4Kills)} kills</span></div><div class="wpn-bar-bg"><div class="wpn-bar-fill" style="width: 31%"></div></div></div>
                <div class="wpn-row"><div class="wpn-top"><span class="wpn-name">AWP</span><span class="wpn-kills">${fmt(awpKills)} kills</span></div><div class="wpn-bar-bg"><div class="wpn-bar-fill" style="width: 15%"></div></div></div>
            </div>
        </div>
    `;

    return headHtml + advHtml;
}

// Stats Search Logic
async function execSearch() {
    haptic('medium');
    const q = $('inp-search').value.trim();
    if (!q) return showToast('Введите ник или Steam ID', 'warn');
    
    $('stats-result').innerHTML = `<div class="sk sk-hero" style="height:300px;"></div>`;
    
    const res = await apiReq(`/api/stats/player?q=${encodeURIComponent(q)}`);
    if (res.success && res.data) {
        // Формируем mockUser для функции билдера
        const pUser = { username: res.data.username, steam_id: res.data.steam_id };
        $('stats-result').innerHTML = buildAdvCard(pUser, res.data, false);
    } else {
        $('stats-result').innerHTML = `<div class="empty"><div class="empty-ico">🚫</div><div class="empty-txt">Игрок не найден</div></div>`;
    }
}

// My Profile Logic
async function loadProfile() {
    $('profile-content').innerHTML = `<div class="sk sk-hero" style="height:300px;"></div><div class="sk sk-list"></div>`;
    
    const res = await apiReq('/api/profile/me');
    if (!res.user) {
        $('profile-content').innerHTML = `<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-txt">Ошибка загрузки профиля</div></div>`;
        return;
    }

    const u = res.user;
    const s = res.stats || {};
    const privs = res.privileges || [];
    
    let html = buildAdvCard(u, s, true);

    // Блок привязки Steam (если нет)
    if (!u.steam_id && !isFounder(u)) {
        html += `
            <div class="card" style="border-color:var(--accent-mid)">
                <div class="sec-lbl" style="margin-top:0;">ПРИВЯЗАТЬ STEAM ID</div>
                <div class="input-group" style="margin-bottom:10px;">
                    <span class="input-ico">🔗</span>
                    <input type="text" id="inp-steam" class="input-base" placeholder="STEAM_0:1:12345678">
                </div>
                <button class="btn-secondary" onclick="linkSteam()" style="margin-top:0; color:var(--accent); border-color:var(--accent-mid)">ПРИВЯЗАТЬ</button>
            </div>
        `;
    }

    // Блок Привилегий
    if (!isFounder(u)) {
        html += `<div class="sec-lbl">МОИ ПРИВИЛЕГИИ</div>`;
        if (privs.length > 0) {
            html += privs.map(p => {
                const days = Math.ceil((new Date(p.expires_at) - Date.now()) / 86400000);
                return `
                    <div class="priv-item">
                        <div class="priv-ico">${p.type === 'vip' ? '⭐' : '💎'}</div>
                        <div class="priv-txt">
                            <div class="priv-t">${p.name}</div>
                            <div class="priv-s">${p.server_name || 'Все серверы'}</div>
                        </div>
                        <div class="priv-d">${days} ДНЕЙ</div>
                    </div>
                `;
            }).join('');
        } else {
            html += `<div class="card"><div class="empty-txt">Нет активных привилегий</div></div>`;
        }
    }

    html += `<div class="credits"><div class="credits-txt">Core Engine by <a href="https://t.me/coder2406">@coder2406</a></div></div>`;
    $('profile-content').innerHTML = html;
}

async function linkSteam() {
    const v = $('inp-steam')?.value.trim();
    if (!v) return showToast('Введи Steam ID', 'err');
    const d = await apiReq('/api/profile/steam', { method:'POST', body:JSON.stringify({ steam_id:v }) });
    if (d.success) { showToast('✅ Steam привязан!', 'ok'); loadProfile(); }
    else showToast('❌ ' + (d.error || 'Ошибка'), 'err');
}

/* ═══════════════════════════════════════════════
   4. TOP LEADERBOARD
═══════════════════════════════════════════════ */
async function loadTop() {
    $('top-content').innerHTML = `<div class="sk sk-hero" style="height:220px;"></div><div class="sk sk-list"></div><div class="sk sk-list"></div>`;
    
    const res = await apiReq(`/api/stats/top?limit=20`);
    const players = res.data || [];
    
    if (!players.length) return $('top-content').innerHTML = '<div class="empty"><div class="empty-ico">🏆</div><div class="empty-txt">База пуста</div></div>';
    
    const keyMap = { kills: 'kills', kd: 'kd', headshots: 'headshots', wins: 'wins' };
    const key = keyMap[state.topFilter] || 'kills';
    const lbl = { kills: 'УБИЙСТВ', kd: 'K/D RATIO', headshots: 'ХЕДШОТОВ', wins: 'ПОБЕД' }[state.topFilter];
    const isKd = key === 'kd';

    const sorted = [...players].sort((a,b) => Number(b[key] || 0) - Number(a[key] || 0));
    const top3 = sorted.slice(0, 3);
    const rest = sorted.slice(3);
    
    let html = `<div class="podium">`;
    [1, 0, 2].forEach(idx => {
        const p = top3[idx];
        if(!p) return;
        const place = idx + 1;
        const val = isKd ? Number(p[key] || 0).toFixed(2) : fmt(p[key]);
        html += `
            <div class="pod-item p${place}">
                <div class="pod-plinth">
                    <div class="pod-ava"><div class="pod-rank">${place === 1 ? '👑' : (place === 2 ? '🥈' : '🥉')}</div>${getInits(p.username)}</div>
                    <div class="pod-name">${p.username}</div>
                    <div style="font-size:9px; color:var(--txt-mut); margin-bottom:4px; text-transform:uppercase;">${p.rank || 'Новичок'}</div>
                    <div class="pod-val">${val}</div>
                </div>
            </div>`;
    });
    html += `</div><div class="sec-lbl">ТОП ИГРОКОВ</div>`;
    
    html += rest.map((p, i) => `
        <div class="top-list-item">
            <div class="tl-num">${i + 4}</div>
            <div class="tl-ava">${getInits(p.username)}</div>
            <div class="tl-info">
                <div class="tl-name">${p.username} <span style="font-size:9px; color:var(--gold); margin-left:4px;">[${p.rank || 'Новичок'}]</span></div>
                <div class="tl-sub">${p.steam_id || 'Не привязан'}</div>
            </div>
            <div class="tl-val-box">
                <div class="tl-val">${isKd ? Number(p[key] || 0).toFixed(2) : fmt(p[key])}</div>
                <div class="tl-lbl">${lbl}</div>
            </div>
        </div>
    `).join('');
    
    $('top-content').innerHTML = html;
}

function switchTop(filter, el) {
    haptic('light');
    state.topFilter = filter;
    document.querySelectorAll('.flt-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    loadTop();
}
