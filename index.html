<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>ForGames.Uz</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ════════════════════════════════════════════════
   CORE DESIGN TOKENS
════════════════════════════════════════════════ */
:root {
  --void: #05070a;
  --void2: #080b10;
  --void3: #0c1018;
  --panel: rgba(12,16,24,0.85);
  --panel2: rgba(16,22,34,0.9);
  --glass: rgba(255,255,255,0.03);
  --glass2: rgba(255,255,255,0.06);

  --green: #00e676;
  --green-dim: rgba(0,230,118,0.08);
  --green-mid: rgba(0,230,118,0.18);
  --green-glow: rgba(0,230,118,0.35);

  --blue: #00d2ff;
  --blue-dim: rgba(0,210,255,0.08);
  --blue-mid: rgba(0,210,255,0.18);
  --blue-glow: rgba(0,210,255,0.35);

  --gold: #ffd740;
  --gold-dim: rgba(255,215,64,0.12);
  --silver: #b0c4d8;
  --bronze: #ff8a55;

  --red: #ff3d5a;
  --red-dim: rgba(255,61,90,0.12);
  --warn: #ffb300;

  --txt: #c8d4e8;
  --txt2: #647080;
  --txt3: #384050;

  --border: rgba(255,255,255,0.05);
  --border2: rgba(255,255,255,0.10);

  --r: 12px;
  --r2: 16px;
  --r3: 20px;

  --font-title: 'Orbitron', monospace;
  --font-body: 'Rajdhani', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

/* ════════════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  height: 100%;
  background: var(--void);
  color: var(--txt);
  font-family: var(--font-body);
  font-size: 15px;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
button { border:none; cursor:pointer; font-family:inherit; background:none; }
input { font-family:inherit; }
::-webkit-scrollbar { width:2px; }
::-webkit-scrollbar-thumb { background:var(--void3); border-radius:2px; }

/* ════════════════════════════════════════════════
   BACKGROUND — CYBER GRID
════════════════════════════════════════════════ */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0;
  background:
    linear-gradient(rgba(0,230,118,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,230,118,0.025) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}
body::after {
  content:'';
  position:fixed; inset:0; z-index:0;
  background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,230,118,0.07) 0%, transparent 60%),
              radial-gradient(ellipse 60% 40% at 100% 100%, rgba(0,210,255,0.04) 0%, transparent 50%);
  pointer-events:none;
}

/* ════════════════════════════════════════════════
   APP SHELL
════════════════════════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

/* ════════════════════════════════════════════════
   HEADER
════════════════════════════════════════════════ */
.hdr {
  flex-shrink: 0;
  padding: 12px 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: rgba(5,7,10,0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position: relative;
  z-index: 20;
}
.hdr::after {
  content:'';
  position:absolute;
  bottom:0; left:16px; right:16px;
  height:1px;
  background: linear-gradient(90deg, transparent, var(--green-glow), var(--blue-glow), transparent);
}
.logo {
  font-family: var(--font-title);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 1.5px;
  background: linear-gradient(135deg, var(--green) 0%, var(--blue) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo span { -webkit-text-fill-color: var(--txt2); }
.hdr-right { display:flex; align-items:center; gap:8px; }
.live-badge {
  display:flex; align-items:center; gap:5px;
  padding: 4px 10px;
  border-radius: 20px;
  background: var(--green-dim);
  border: 1px solid var(--green-mid);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--green);
  letter-spacing: 0.5px;
}
.live-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: blink 1.6s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.hdr-avatar-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--glass2);
  border: 1px solid var(--border2);
  display:flex; align-items:center; justify-content:center;
  font-size: 14px;
  cursor:pointer;
}

/* ════════════════════════════════════════════════
   CONTENT & PAGES
════════════════════════════════════════════════ */
.content { flex:1; overflow-y:auto; overflow-x:hidden; position:relative; }
.page {
  display: none;
  padding: 14px 14px 90px;
  min-height: 100%;
  position:absolute; inset:0;
  overflow-y: auto;
  overflow-x: hidden;
}
.page.active {
  display: block;
  animation: slideIn 0.22s cubic-bezier(0.25,0.46,0.45,0.94) both;
}
.page.exit {
  animation: slideOut 0.18s cubic-bezier(0.55,0,1,0.45) both;
}
@keyframes slideIn {
  from { opacity:0; transform:translateX(16px); }
  to { opacity:1; transform:translateX(0); }
}
@keyframes slideOut {
  from { opacity:1; transform:translateX(0); }
  to { opacity:0; transform:translateX(-16px); }
}

/* ════════════════════════════════════════════════
   BOTTOM NAV
════════════════════════════════════════════════ */
.nav {
  flex-shrink: 0;
  display: flex;
  background: rgba(5,7,10,0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  padding: 8px 0;
  padding-bottom: calc(8px + env(safe-area-inset-bottom));
  position: relative;
  z-index: 20;
}
.nav::before {
  content:'';
  position:absolute;
  top:0; left:10%; right:10%;
  height:1px;
  background: linear-gradient(90deg, transparent, var(--green-glow), transparent);
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 4px 0;
  cursor: pointer;
  transition: transform 0.15s;
  position: relative;
}
.nav-item:active { transform: scale(0.93); }
.nav-ico {
  font-size: 19px;
  line-height: 1;
  filter: grayscale(1) opacity(0.35);
  transition: all 0.2s;
}
.nav-lbl {
  font-family: var(--font-title);
  font-size: 7px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--txt3);
  transition: color 0.2s;
}
.nav-item.active .nav-ico { filter: none; }
.nav-item.active .nav-lbl { color: var(--green); }
.nav-item.active::after {
  content:'';
  position:absolute;
  top: -8px;
  left: 50%; transform:translateX(-50%);
  width: 24px; height:2px;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--green), var(--blue));
  box-shadow: 0 0 8px var(--green-glow);
}

/* ════════════════════════════════════════════════
   SECTION LABEL
════════════════════════════════════════════════ */
.sec-lbl {
  font-family: var(--font-title);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--txt3);
  margin: 18px 0 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sec-lbl:first-child { margin-top: 0; }
.sec-lbl::after {
  content:'';
  flex:1; height:1px;
  background: linear-gradient(90deg, var(--border2), transparent);
}

/* ════════════════════════════════════════════════
   SKELETON LOADER
════════════════════════════════════════════════ */
.sk {
  background: linear-gradient(90deg,
    var(--void3) 25%,
    rgba(28,36,52,0.8) 50%,
    var(--void3) 75%);
  background-size: 300% 100%;
  animation: shimmer 1.6s ease-in-out infinite;
  border-radius: var(--r);
}
@keyframes shimmer {
  0% { background-position: 100% 0; }
  100% { background-position: -100% 0; }
}
.sk-h { height: 76px; margin-bottom: 8px; border-radius: var(--r2); }
.sk-h2 { height: 50px; margin-bottom: 8px; }
.sk-txt { height: 12px; margin-bottom: 6px; }

/* ════════════════════════════════════════════════
   GLASS CARDS
════════════════════════════════════════════════ */
.card {
  background: var(--panel);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 14px;
  margin-bottom: 8px;
  position: relative;
  overflow: hidden;
}
.card::before {
  content:'';
  position:absolute; top:0; left:0; right:0;
  height:1px;
  background:linear-gradient(90deg, transparent, var(--glass2), transparent);
}
.card.glow-green { border-color: var(--green-mid); box-shadow: 0 0 20px var(--green-dim), inset 0 1px 0 var(--green-dim); }
.card.glow-blue { border-color: var(--blue-mid); box-shadow: 0 0 20px var(--blue-dim), inset 0 1px 0 var(--blue-dim); }
.card.glow-gold { border-color: rgba(255,215,64,0.2); box-shadow: 0 0 20px var(--gold-dim); }

/* ════════════════════════════════════════════════
   HOME PAGE — FLAGSHIP SERVER
════════════════════════════════════════════════ */
.flagship-card {
  background: linear-gradient(135deg, rgba(0,230,118,0.06) 0%, rgba(0,210,255,0.04) 100%);
  border: 1px solid var(--green-mid);
  border-radius: var(--r3);
  padding: 20px;
  margin-bottom: 10px;
  position: relative;
  overflow: hidden;
}
.flagship-card::before {
  content:'';
  position:absolute; top:-40px; right:-40px;
  width:120px; height:120px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(0,230,118,0.12) 0%, transparent 70%);
}
.flagship-card::after {
  content:'';
  position:absolute; top:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, var(--green-glow), transparent);
}
.flagship-badge {
  display:inline-flex; align-items:center; gap:5px;
  background: linear-gradient(135deg, rgba(0,230,118,0.15), rgba(0,210,255,0.10));
  border: 1px solid var(--green-mid);
  border-radius: 20px;
  padding: 3px 10px;
  font-family: var(--font-title);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--green);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.flagship-name {
  font-family: var(--font-title);
  font-size: 17px;
  font-weight: 800;
  letter-spacing: 0.5px;
  background: linear-gradient(135deg, #fff 0%, var(--txt) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}
.flagship-ip {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--blue);
  letter-spacing: 0.5px;
  margin-bottom: 14px;
}
.flagship-row {
  display:flex; align-items:flex-end; justify-content:space-between;
  margin-bottom: 14px;
}
.flagship-players {
  display:flex; flex-direction:column; gap:2px;
}
.flagship-count {
  font-family: var(--font-title);
  font-size: 38px;
  font-weight: 900;
  line-height:1;
  background: linear-gradient(135deg, var(--green) 0%, var(--blue) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.flagship-max { font-size:13px; color:var(--txt2); font-weight:400; margin-left:2px; }
.flagship-map-box {
  text-align:right;
}
.flagship-map-lbl { font-family:var(--font-mono); font-size:9px; color:var(--txt3); letter-spacing:1px; text-transform:uppercase; }
.flagship-map-val { font-family:var(--font-title); font-size:13px; color:var(--blue); margin-top:2px; }
.flagship-bar-wrap {
  height:4px; background:rgba(255,255,255,0.06);
  border-radius:4px; margin-bottom:14px; overflow:hidden;
}
.flagship-bar {
  height:100%;
  background: linear-gradient(90deg, var(--green), var(--blue));
  border-radius:4px;
  box-shadow: 0 0 8px var(--green-glow);
  transition: width 0.8s cubic-bezier(0.22,1,0.36,1);
}
.btn-fast {
  display:flex; align-items:center; justify-content:center; gap:8px;
  width:100%;
  padding: 13px;
  border-radius: var(--r2);
  background: linear-gradient(135deg, var(--green), #00c853);
  color: var(--void);
  font-family: var(--font-title);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  box-shadow: 0 4px 20px rgba(0,230,118,0.3);
  transition: all 0.15s;
}
.btn-fast:active { transform:scale(0.97); box-shadow:0 2px 10px rgba(0,230,118,0.2); }
.btn-fast .ico { font-size:16px; }

/* server list cards */
.srv-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 12px 14px;
  margin-bottom: 8px;
  display:flex; align-items:center; gap:12px;
  transition: border-color 0.15s, background 0.15s;
  cursor: default;
}
.srv-card:active { background: var(--panel2); }
.srv-dot {
  width:9px; height:9px; border-radius:50%; flex-shrink:0;
}
.srv-dot.online { background:var(--green); box-shadow:0 0 0 3px rgba(0,230,118,0.15); }
.srv-dot.offline { background:var(--txt3); }
.srv-dot.warn { background:var(--warn); box-shadow:0 0 0 3px rgba(255,179,0,0.15); }
.srv-info { flex:1; min-width:0; }
.srv-name-txt { font-family:var(--font-body); font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.srv-meta { display:flex; align-items:center; gap:8px; margin-top:2px; }
.srv-map-txt { font-family:var(--font-mono); font-size:10px; color:var(--blue); }
.srv-ip-txt { font-family:var(--font-mono); font-size:9px; color:var(--txt3); }
.srv-right { flex-shrink:0; text-align:right; }
.srv-cnt { font-family:var(--font-title); font-size:16px; font-weight:700; line-height:1; color:var(--txt); }
.srv-cnt .slash { color:var(--txt3); font-size:12px; }
.srv-mini-bar { width:44px; height:3px; background:rgba(255,255,255,0.06); border-radius:2px; margin-top:4px; overflow:hidden; }
.srv-mini-fill { height:100%; border-radius:2px; background:var(--green); transition:width 0.6s ease; }

/* news card */
.news-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 14px;
  margin-bottom: 8px;
  position:relative; overflow:hidden;
}
.news-type {
  display:inline-block;
  font-family:var(--font-title); font-size:8px; font-weight:700;
  letter-spacing:1.5px; text-transform:uppercase;
  padding:2px 8px; border-radius:20px; margin-bottom:8px;
}
.news-type.update { background:var(--green-dim); color:var(--green); border:1px solid var(--green-mid); }
.news-type.event { background:var(--gold-dim); color:var(--gold); border:1px solid rgba(255,215,64,0.25); }
.news-type.info { background:var(--blue-dim); color:var(--blue); border:1px solid var(--blue-mid); }
.news-title { font-family:var(--font-body); font-weight:700; font-size:15px; line-height:1.3; margin-bottom:5px; }
.news-body { font-size:13px; color:var(--txt2); line-height:1.5; }
.news-date { font-family:var(--font-mono); font-size:9px; color:var(--txt3); margin-top:8px; }

/* ════════════════════════════════════════════════
   STORE PAGE
════════════════════════════════════════════════ */
.balance-hero {
  background: linear-gradient(135deg, rgba(0,230,118,0.07), rgba(0,210,255,0.04));
  border: 1px solid var(--green-mid);
  border-radius: var(--r2);
  padding: 16px;
  margin-bottom: 12px;
  display:flex; align-items:center; justify-content:space-between;
  position:relative; overflow:hidden;
}
.balance-hero::after {
  content:'';
  position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, var(--green-glow), transparent);
}
.bal-left { }
.bal-label { font-family:var(--font-title); font-size:8px; font-weight:600; letter-spacing:1.5px; color:var(--txt3); text-transform:uppercase; }
.bal-amount {
  font-family:var(--font-title); font-size:26px; font-weight:800;
  background:linear-gradient(135deg, var(--green), var(--blue));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  line-height:1.1; margin-top:2px;
}
.bal-currency { font-family:var(--font-mono); font-size:11px; color:var(--txt2); margin-top:1px; }
.btn-topup {
  background: var(--green-dim);
  border: 1px solid var(--green-mid);
  border-radius: var(--r);
  padding: 10px 14px;
  color: var(--green);
  font-family: var(--font-title);
  font-size: 10px; font-weight:700; letter-spacing:0.8px;
  text-transform:uppercase;
  transition:all 0.15s;
  white-space:nowrap;
}
.btn-topup:active { background:var(--green-mid); }

.shop-tabs {
  display:flex; gap:6px; margin-bottom:14px;
}
.shop-tab {
  flex:1; padding:8px 6px;
  border-radius:var(--r);
  background:var(--glass);
  border:1px solid var(--border);
  font-family:var(--font-title); font-size:9px; font-weight:600;
  letter-spacing:0.8px; text-transform:uppercase;
  color:var(--txt3); cursor:pointer;
  transition:all 0.18s;
  display:flex; align-items:center; justify-content:center; gap:5px;
}
.shop-tab.active {
  background: var(--green-dim);
  border-color: var(--green-mid);
  color: var(--green);
  box-shadow:0 0 10px var(--green-dim);
}
.new-badge-tab {
  background:var(--red); color:#fff;
  border-radius:4px; padding:1px 4px;
  font-size:7px; font-weight:700; letter-spacing:0.5px;
}

.priv-grid { display:grid; grid-template-columns:1fr; gap:10px; }
.priv-card {
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--r2);
  padding:16px;
  position:relative; overflow:hidden;
  transition:border-color 0.2s, box-shadow 0.2s;
}
.priv-card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, var(--glass2), transparent);
}
.priv-card.tier-basic { border-color:rgba(100,112,128,0.2); }
.priv-card.tier-vip { border-color:rgba(255,215,64,0.2); box-shadow:0 0 16px var(--gold-dim); }
.priv-card.tier-vip::after { content:''; position:absolute; top:-20px; right:-20px; width:80px; height:80px; background:radial-gradient(circle, rgba(255,215,64,0.07) 0%, transparent 70%); border-radius:50%; }
.priv-card.tier-premium { border-color:var(--green-mid); box-shadow:0 0 16px var(--green-dim); }
.priv-card.tier-premium::after { content:''; position:absolute; top:-20px; right:-20px; width:80px; height:80px; background:radial-gradient(circle, rgba(0,230,118,0.07) 0%, transparent 70%); border-radius:50%; }

.priv-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
.priv-tier-badge {
  display:inline-flex; align-items:center; gap:4px;
  font-family:var(--font-title); font-size:8px; font-weight:700;
  letter-spacing:1.2px; text-transform:uppercase;
  padding:3px 9px; border-radius:20px;
}
.priv-tier-badge.basic { background:rgba(100,112,128,0.12); color:var(--txt2); border:1px solid var(--border2); }
.priv-tier-badge.vip { background:var(--gold-dim); color:var(--gold); border:1px solid rgba(255,215,64,0.25); }
.priv-tier-badge.premium { background:var(--green-dim); color:var(--green); border:1px solid var(--green-mid); }
.priv-name { font-family:var(--font-title); font-size:15px; font-weight:700; letter-spacing:0.3px; margin-bottom:3px; }
.priv-name.vip-txt { color:var(--gold); }
.priv-name.premium-txt { color:var(--green); }
.priv-desc { font-size:12px; color:var(--txt2); line-height:1.5; margin-bottom:12px; }

.toast {

function showToast(msg, type='ok') {
  haptic('medium');
  const w = $('toasts');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  const ico = type === 'err' ? '❌' : type === 'warn' ? '⚠️' : '✅';
  t.innerHTML = `<span>${ico}</span><span>${msg}</span>`;
  w.appendChild(t);
  setTimeout(() => { t.classList.add('remove'); setTimeout(()=>t.remove(), 200); }, 2800);
}

async function apiCall(path, opts={}) {
  const headers = { 'Content-Type':'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const r = await fetch(API_BASE + path, { ...opts, headers:{ ...headers, ...(opts.headers||{}) } });
  return r.json();
}

async function auth() {

  try {

function fastConnect() {
  haptic('heavy');
  const ip = FLAGSHIP.full;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(ip).then(() => {
      showToast('IP скопирован! Заходи в CS 1.6 🎮', 'ok');
    }).catch(() => fallbackCopy(ip));
  } else {
    fallbackCopy(ip);
  }
}

function fallbackCopy(text) {
  const el = document.createElement('textarea');
  el.value = text;
  el.style.position = 'fixed'; el.style.opacity = '0';
  document.body.appendChild(el);
  el.select();
  try { document.execCommand('copy'); showToast('IP скопирован! Заходи в CS 1.6 🎮', 'ok'); }
  catch(e) { showToast(text, 'ok'); }
  document.body.removeChild(el);
}

  const ranks = ['Новичок','Боец','Ветеран','Элита','Легенда'];
  const ri = ranks.indexOf(rank);
  const maxSkill = 5000;
  const nextRankSkill = (ri+1)*1000;
  const curRankSkill = ri*1000;
  const pct = Math.min(100,Math.round(((skill-curRankSkill)/(nextRankSkill-curRankSkill))*100));
  const kdPct = Math.min(100, Math.round(parseFloat(kd)/3*100));
  const hsPct = kills ? Math.round(hs/kills*100) : 0;

  el.innerHTML = `
    <div class="player-hero">

        </div>

        <div class="stat-cell"><div class="sc-lbl">Убийства</div><div class="sc-val g">${fmt(kills)}</div></div>
        <div class="stat-cell"><div class="sc-lbl">Смерти</div><div class="sc-val red">${fmt(deaths)}</div></div>
        <div class="stat-cell"><div class="sc-lbl">K/D Ratio</div><div class="sc-val b">${kd}</div></div>
        <div class="stat-cell"><div class="sc-lbl">Хедшоты</div><div class="sc-val gold">${fmt(hs)}</div></div>
      </div>
      <div class="rank-progress" style="margin-top:14px">
        <div class="rp-label">
          <span class="rp-current">⬆️ До ${ranks[ri+1]||'MAX'}</span>
          <span class="rp-next">Skill: ${fmt(skill)}</span>
        </div>
        <div class="rp-bar"><div class="rp-fill" id="rp-fill" style="width:0%"></div></div>
        <div class="rp-pct">${pct}%</div>
      </div>
    </div>

    <div class="sec-lbl">Детальная статистика</div>
    <div class="skill-card">
      <div class="skill-ico">💀</div>
      <div class="skill-info">
        <div class="skill-name">K/D Ratio</div>
        <div class="skill-bar-wrap"><div class="skill-bar-fill kd" id="sk-kd" style="width:0%"></div></div>
      </div>
      <div class="skill-val" style="color:var(--blue)">${kd}</div>
    </div>
    <div class="skill-card">
      <div class="skill-ico">🎯</div>
      <div class="skill-info">
        <div class="skill-name">Headshot %</div>
        <div class="skill-bar-wrap"><div class="skill-bar-fill hs" id="sk-hs" style="width:0%"></div></div>
      </div>
      <div class="skill-val" style="color:var(--gold)">${hsPct}%</div>
    </div>
    <div class="skill-card">
      <div class="skill-ico">🏆</div>
      <div class="skill-info">
        <div class="skill-name">Победы</div>
        <div class="skill-bar-wrap"><div class="skill-bar-fill kd" id="sk-wins" style="width:0%"></div></div>
      </div>
      <div class="skill-val" style="color:var(--green)">${fmt(wins)}</div>
    </div>
  `;
  setTimeout(()=>{
    const rf=$('rp-fill'); if(rf) rf.style.width=pct+'%';
    const kdf=$('sk-kd'); if(kdf) kdf.style.width=kdPct+'%';
    const hsf=$('sk-hs'); if(hsf) hsf.style.width=hsPct+'%';
    const winf=$('sk-wins'); if(winf) winf.style.width=Math.min(100,wins)+'%';
  },100);
}

/* ═══════════════════════════════════════════════
   TOP LEADERBOARD
═══════════════════════════════════════════════ */
async function loadTop() {
  if (topData[currentTopFilter]) {
    renderTop(topData[currentTopFilter]);
    return;
  }
  const el = $('top-content');
  el.innerHTML = `
    <div class="sk sk-h" style="height:160px;border-radius:20px;margin-bottom:12px;"></div>
    ${[...Array(5)].map(()=>`<div class="sk sk-h2"></div>`).join('')}`;
  try {
    if (!token) await auth();
    const d = await apiCall(`/api/stats/top?type=${currentTopFilter}&limit=20`);
    const players = d.players || d.top || [];
    topData[currentTopFilter] = players;
    renderTop(players);
  } catch(e) {
    el.innerHTML = `<div class="empty"><div class="empty-ico">📡</div><div class="empty-txt">Ошибка загрузки</div></div>`;
  }
}

function renderTop(players) {
  if (!players.length) {
    $('top-content').innerHTML = `<div class="empty"><div class="empty-ico">🏆</div><div class="empty-txt">Нет данных</div></div>`;
    return;
  }
  const keyMap = { kills:'total_kills', kd:'kd', headshots:'total_hs', wins:'total_wins' };
  const key = keyMap[currentTopFilter] || 'total_kills';
  const lbl = { kills:'убийств', kd:'K/D', headshots:'хедшотов', wins:'побед' }[currentTopFilter];

  const top3 = players.slice(0,3);
  const rest = players.slice(3);

  const podHtml = (() => {
    const [p1,p2,p3] = top3;
    const pod = (p,cls,crown) => !p?'<div></div>':`
      <div class="podium-item ${cls}">
        ${crown?`<div class="pod-crown">${crown}</div>`:'<div style="height:28px"></div>'}
        <div class="podium-plinth">
          <div class="pod-avatar">${inits(p.name||'?')}</div>
          <div class="pod-name">${p.name||'Unknown'}</div>
          <div class="pod-val">${currentTopFilter==='kd'?Number(p[key]||0).toFixed(2):fmt(p[key]||0)}</div>
        </div>
      </div>`;
    return `<div class="podium">
      ${pod(p2,'p2','🥈')}${pod(p1,'p1','👑')}${pod(p3,'p3','🥉')}
    </div>`;
  })();

  const restHtml = rest.map((p,i)=>`
    <div class="top-row">
      <div class="tr-rank" style="color:var(--txt3)">${i+4}</div>
      <div class="tr-avatar">${inits(p.name||'?')}</div>
      <div class="tr-info"><div class="tr-name">${p.name||'Unknown'}</div><div class="tr-sub">${p.steam_id||''}</div></div>
      <div class="tr-val">
        <div class="tr-num">${currentTopFilter==='kd'?Number(p[key]||0).toFixed(2):fmt(p[key]||0)}</div>
        <div class="tr-lbl">${lbl}</div>
      </div>
    </div>`).join('');

  $('top-content').innerHTML = podHtml + restHtml;
}

function switchTopFilter(filter, btn) {
  haptic('light');
  currentTopFilter = filter;
  document.querySelectorAll('.top-flt').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadTop();
}

/* ═══════════════════════════════════════════════
   PROFILE
═══════════════════════════════════════════════ */
async function loadProfile() {
  const el = $('profile-content');
  el.innerHTML = `
    <div class="sk sk-h" style="height:180px;border-radius:20px;margin-bottom:10px;"></div>
    <div class="sk sk-h" style="height:80px;border-radius:16px;margin-bottom:10px;"></div>`;
  try {
    if (!token) await auth();
    const d = await apiCall('/api/profile/me');
    const u = d.user || {};
    const s = d.stats || {};
    const privs = d.privileges || [];
    const founder = isFounder(userData || u);

    const avaEl = `<div class="pf-ava" style="${founder?'border-color:var(--gold);color:var(--gold);box-shadow:0 0 24px rgba(255,215,64,0.25)':''}">${inits(u.first_name||u.username||'U')}</div>`;

    const founderBlock = founder ? `
      <div class="founder-hero">
        <div class="founder-inner">
          <div class="founder-badge">
            <div class="founder-dot"></div>
            <div class="founder-badge-text">FOUNDER | ГЛ. ТЕХ. АДМИНИСТРАТОР</div>
          </div>
          <div class="pf-top">
            <div class="pf-ava" style="border-color:var(--gold);color:var(--gold);box-shadow:0 0 24px rgba(255,215,64,0.25)">${inits(u.first_name||u.username||'F')}</div>
            <div>
              <div class="pf-name" style="background:linear-gradient(135deg,var(--gold),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">${u.first_name||'Founder'}</div>
              <div class="pf-handle">@${u.username||'coder2406'}</div>
            </div>
          </div>
          <div class="pf-4grid">
            <div class="pf-cell"><div class="pf-lbl">Убийства</div><div class="pf-val g">${fmt(s.total_kills)}</div></div>
            <div class="pf-cell"><div class="pf-lbl">K/D</div><div class="pf-val b">${Number(s.kd||0).toFixed(2)}</div></div>
            <div class="pf-cell"><div class="pf-lbl">Победы</div><div class="pf-val g">${fmt(s.total_wins)}</div></div>
            <div class="pf-cell"><div class="pf-lbl">Баланс</div><div class="pf-val gold">${fmt(u.balance)}</div></div>
          </div>
        </div>
      </div>` : `
      <div class="profile-card">
        <div class="pf-top">${avaEl}
          <div>
            <div class="pf-name">${u.first_name||u.username||'Игрок'}</div>
            ${u.username?`<div class="pf-handle">@${u.username}</div>`:''}
          </div>
        </div>
        <div class="pf-4grid">
          <div class="pf-cell"><div class="pf-lbl">Убийства</div><div class="pf-val g">${fmt(s.total_kills)}</div></div>
          <div class="pf-cell"><div class="pf-lbl">K/D</div><div class="pf-val b">${Number(s.kd||0).toFixed(2)}</div></div>
          <div class="pf-cell"><div class="pf-lbl">Победы</div><div class="pf-val g">${fmt(s.total_wins)}</div></div>
          <div class="pf-cell"><div class="pf-lbl">Баланс</div><div class="pf-val gold">${fmt(u.balance)}</div></div>
        </div>
      </div>`;

    const privHtml = privs.length
      ? privs.map(p=>{
          const days = Math.ceil((new Date(p.expires_at)-Date.now())/86400000);
          return `<div class="priv-item">
            <div class="priv-ico">${p.type==='vip'?'⭐':'💎'}</div>
            <div class="priv-txt">
              <div class="priv-title">${p.name}</div>
              <div class="priv-srv">${p.server_name||'Все серверы'}</div>
            </div>
            <div class="priv-exp-days">${days}д</div>
          </div>`;
        }).join('')
      : `<div class="empty" style="padding:24px 0">
           <div class="empty-ico">🔑</div>
           <div class="empty-txt">Нет активных привилегий</div>
         </div>`;

    const steamBlock = !u.steam_id ? `
      <div class="card" style="margin-bottom:10px">
        <div style="font-family:var(--font-title);font-size:10px;letter-spacing:1px;color:var(--txt3);margin-bottom:10px">ПРИВЯЗАТЬ STEAM ID</div>
        <div class="topup-form">
          <input id="steam-inp" placeholder="STEAM_0:1:12345678">
          <button class="btn-primary" onclick="linkSteam()">🔗 ПРИВЯЗАТЬ</button>
        </div>
      </div>` : '';

    el.innerHTML = `
      ${founderBlock}
      ${!founder ? '<div class="sec-lbl">Мои привилегии</div>' + privHtml : ''}
      ${!founder ? steamBlock : ''}
      <div class="credits" style="margin-top:16px">
        <div class="credits-txt">Core Engine by <a href="https://t.me/coder2406">@coder2406</a></div>
      </div>`;

    if (founder) {
      const secLbl = document.createElement('div');
      secLbl.className = 'sec-lbl'; secLbl.textContent = 'Мои привилегии';
      el.appendChild(secLbl);
      const privWrap = document.createElement('div'); privWrap.innerHTML = privHtml;
      el.appendChild(privWrap);
    }

  } catch(e) {
    el.innerHTML = `<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-txt">Ошибка загрузки профиля</div></div>`;
  }
}

async function linkSteam() {
  const v = $('steam-inp')?.value.trim();
  if (!v) { showToast('Введи Steam ID', 'err'); return; }
  try {
    const d = await apiCall('/api/profile/steam', { method:'POST', body:JSON.stringify({ steam_id:v }) });
    if (d.success) { showToast('✅ Steam привязан!', 'ok'); loadProfile(); }
    else showToast('❌ ' + (d.error||'Ошибка'), 'err');
  } catch(e) { showToast('Ошибка', 'err'); }
}
