<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>ForGames.Uz</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ════════════════════════════════════════════════
   CORE DESIGN TOKENS & BACKGROUND
════════════════════════════════════════════════ */
:root {
  --void: #05070a; --void2: #080b10; --void3: #0c1018;
  --panel: rgba(12,16,24,0.85); --panel2: rgba(16,22,34,0.9);
  --glass: rgba(255,255,255,0.03); --glass2: rgba(255,255,255,0.06);
  --green: #00e676; --green-dim: rgba(0,230,118,0.08); --green-mid: rgba(0,230,118,0.18); --green-glow: rgba(0,230,118,0.35);
  --blue: #00d2ff; --blue-dim: rgba(0,210,255,0.08); --blue-mid: rgba(0,210,255,0.18); --blue-glow: rgba(0,210,255,0.35);
  --gold: #ffd740; --gold-dim: rgba(255,215,64,0.12); --silver: #b0c4d8; --bronze: #ff8a55;
  --red: #ff3d5a; --red-dim: rgba(255,61,90,0.12); --warn: #ffb300;
  --txt: #c8d4e8; --txt2: #647080; --txt3: #384050;
  --border: rgba(255,255,255,0.05); --border2: rgba(255,255,255,0.10);
  --r: 12px; --r2: 16px; --r3: 20px;
  --font-title: 'Orbitron', monospace; --font-body: 'Rajdhani', sans-serif; --font-mono: 'JetBrains Mono', monospace;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height: 100%; background: var(--void); color: var(--txt); font-family: var(--font-body); font-size: 15px; overflow: hidden; -webkit-font-smoothing: antialiased; }
button { border:none; cursor:pointer; font-family:inherit; background:none; }
input { font-family:inherit; }
::-webkit-scrollbar { width:2px; } ::-webkit-scrollbar-thumb { background:var(--void3); border-radius:2px; }

body::before { content:''; position:fixed; inset:0; z-index:0; background: linear-gradient(rgba(0,230,118,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(0,230,118,0.025) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }
body::after { content:''; position:fixed; inset:0; z-index:0; background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,230,118,0.07) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 100% 100%, rgba(0,210,255,0.04) 0%, transparent 50%); pointer-events:none; }

#app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; position: relative; z-index: 1; }

/* ════════════════════════════════════════════════
   HEADER & NAV
════════════════════════════════════════════════ */
.hdr { flex-shrink: 0; padding: 12px 16px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: rgba(5,7,10,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); position: relative; z-index: 20; }
.hdr::after { content:''; position:absolute; bottom:0; left:16px; right:16px; height:1px; background: linear-gradient(90deg, transparent, var(--green-glow), var(--blue-glow), transparent); }
.logo { font-family: var(--font-title); font-size: 16px; font-weight: 700; letter-spacing: 1.5px; background: linear-gradient(135deg, var(--green) 0%, var(--blue) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.logo span { -webkit-text-fill-color: var(--txt2); }
.hdr-right { display:flex; align-items:center; gap:8px; }
.live-badge { display:flex; align-items:center; gap:5px; padding: 4px 10px; border-radius: 20px; background: var(--green-dim); border: 1px solid var(--green-mid); font-family: var(--font-mono); font-size: 10px; font-weight: 600; color: var(--green); letter-spacing: 0.5px; }
.live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 1.6s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.nav { flex-shrink: 0; display: flex; background: rgba(5,7,10,0.92); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-top: 1px solid var(--border); padding: 8px 0; padding-bottom: calc(8px + env(safe-area-inset-bottom)); position: relative; z-index: 20; }
.nav::before { content:''; position:absolute; top:0; left:10%; right:10%; height:1px; background: linear-gradient(90deg, transparent, var(--green-glow), transparent); }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 0; cursor: pointer; transition: transform 0.15s; position: relative; }
.nav-item:active { transform: scale(0.93); }
.nav-ico { font-size: 19px; line-height: 1; filter: grayscale(1) opacity(0.35); transition: all 0.2s; }
.nav-lbl { font-family: var(--font-title); font-size: 7px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--txt3); transition: color 0.2s; }
.nav-item.active .nav-ico { filter: none; opacity:1; }
.nav-item.active .nav-lbl { color: var(--green); }
.nav-item.active::after { content:''; position:absolute; top: -8px; left: 50%; transform:translateX(-50%); width: 24px; height:2px; border-radius: 2px; background: linear-gradient(90deg, var(--green), var(--blue)); box-shadow: 0 0 8px var(--green-glow); }

/* ════════════════════════════════════════════════
   PAGES & COMPONENTS
════════════════════════════════════════════════ */
.content { flex:1; overflow-y:auto; overflow-x:hidden; position:relative; }
.page { display: none; padding: 14px 14px 90px; min-height: 100%; position:absolute; inset:0; overflow-y: auto; overflow-x: hidden; }
.page.active { display: block; animation: slideIn 0.22s cubic-bezier(0.25,0.46,0.45,0.94) both; }
@keyframes slideIn { from { opacity:0; transform:translateX(16px); } to { opacity:1; transform:translateX(0); } }

.sec-lbl { font-family: var(--font-title); font-size: 9px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--txt3); margin: 18px 0 10px; display: flex; align-items: center; gap: 8px; }
.sec-lbl:first-child { margin-top: 0; }
.sec-lbl::after { content:''; flex:1; height:1px; background: linear-gradient(90deg, var(--border2), transparent); }

.sk { background: linear-gradient(90deg, var(--void3) 25%, rgba(28,36,52,0.8) 50%, var(--void3) 75%); background-size: 300% 100%; animation: shimmer 1.6s ease-in-out infinite; border-radius: var(--r); }
@keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
.sk-h { height: 76px; margin-bottom: 8px; border-radius: var(--r2); }

/* SERVERS */
.srv-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--r2); padding: 12px 14px; margin-bottom: 8px; display:flex; align-items:center; gap:12px; transition: border-color 0.15s, background 0.15s; cursor: pointer; }
.srv-card:active { background: var(--panel2); border-color:var(--green-mid); }
.srv-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.srv-dot.online { background:var(--green); box-shadow:0 0 0 3px rgba(0,230,118,0.15); }
.srv-dot.offline { background:var(--txt3); }
.srv-dot.warn { background:var(--warn); box-shadow:0 0 0 3px rgba(255,179,0,0.15); }
.srv-info { flex:1; min-width:0; }
.srv-name-txt { font-family:var(--font-body); font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.srv-meta { display:flex; align-items:center; gap:8px; margin-top:2px; }
.srv-map-txt { font-family:var(--font-mono); font-size:10px; color:var(--blue); }
.srv-ip-txt { font-family:var(--font-mono); font-size:9px; color:var(--txt3); }
.srv-right { flex-shrink:0; text-align:right; }
.srv-cnt { font-family:var(--font-title); font-size:16px; font-weight:700; line-height:1; color:var(--txt); }
.srv-cnt .slash { color:var(--txt3); font-size:12px; }
.srv-mini-bar { width:44px; height:3px; background:rgba(255,255,255,0.06); border-radius:2px; margin-top:4px; overflow:hidden; }
.srv-mini-fill { height:100%; border-radius:2px; background:var(--green); transition:width 0.6s ease; }

/* TOP/STATS */
.top-filters { display:flex; gap:6px; margin-bottom:14px; overflow-x:auto; padding-bottom:2px; }
.top-filters::-webkit-scrollbar { display:none; }
.top-flt { flex-shrink:0; padding:7px 14px; background:var(--glass); border:1px solid var(--border); border-radius:20px; font-family:var(--font-title); font-size:9px; font-weight:600; letter-spacing:0.8px; text-transform:uppercase; color:var(--txt3); cursor:pointer; transition:all 0.18s; white-space:nowrap; }
.top-flt.active { background:var(--green-dim); border-color:var(--green-mid); color:var(--green); }
.top-row { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--panel); border:1px solid var(--border); border-radius:var(--r2); margin-bottom:6px; transition:background 0.15s; }
.tr-rank { font-family:var(--font-mono); font-size:12px; width:22px; flex-shrink:0; text-align:center; }
.tr-rank.r1{color:var(--gold);} .tr-rank.r2{color:var(--silver);} .tr-rank.r3{color:var(--bronze);}
.tr-avatar { width:34px; height:34px; border-radius:9px; background:var(--void3); border:1px solid var(--border2); display:flex; align-items:center; justify-content:center; font-family:var(--font-title); font-size:11px; font-weight:700; color:var(--txt2); flex-shrink:0; }
.tr-name { flex:1; font-weight:600; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tr-sub { font-size:10px; color:var(--txt3); margin-top:1px; }
.tr-val { flex-shrink:0; text-align:right; }
.tr-num { font-family:var(--font-title); font-size:16px; font-weight:700; color:var(--green); }
.tr-lbl { font-family:var(--font-mono); font-size:9px; color:var(--txt3); margin-top:1px; }
.search-input { width:100%; background:var(--panel); border:1px solid var(--border); border-radius:var(--r2); padding:10px 12px; color:var(--txt); font-family:var(--font-body); font-size:14px; outline:none; transition:border-color 0.15s; margin-bottom:12px; }
.search-input:focus { border-color:var(--green-mid); }

/* SHOP */
.balance-hero { background: linear-gradient(135deg, rgba(0,230,118,0.07), rgba(0,210,255,0.04)); border: 1px solid var(--green-mid); border-radius: var(--r2); padding: 16px; margin-bottom: 12px; display:flex; align-items:center; justify-content:space-between; position:relative; overflow:hidden; }
.balance-hero::after { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg, transparent, var(--green-glow), transparent); }
.bal-label { font-family:var(--font-title); font-size:8px; font-weight:600; letter-spacing:1.5px; color:var(--txt3); text-transform:uppercase; }
.bal-amount { font-family:var(--font-title); font-size:26px; font-weight:800; background:linear-gradient(135deg, var(--green), var(--blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1.1; margin-top:2px; }
.bal-currency { font-family:var(--font-mono); font-size:11px; color:var(--txt2); margin-top:1px; }
.btn-topup { background: var(--green-dim); border: 1px solid var(--green-mid); border-radius: var(--r); padding: 10px 14px; color: var(--green); font-family: var(--font-title); font-size: 10px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; transition:all 0.15s; white-space:nowrap; }
.btn-topup:active { background:var(--green-mid); }

.priv-card { background:var(--panel); border:1px solid var(--border); border-radius:var(--r2); padding:16px; margin-bottom:10px; position:relative; overflow:hidden; }
.priv-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
.priv-name { font-family:var(--font-title); font-size:15px; font-weight:700; letter-spacing:0.3px; margin-bottom:3px; color:var(--gold); }
.priv-desc { font-size:12px; color:var(--txt2); line-height:1.5; margin-bottom:12px; }
.priv-features { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:14px; }
.priv-feat { background:var(--glass2); border:1px solid var(--border); border-radius:6px; padding:3px 8px; font-size:11px; color:var(--txt2); }
.priv-bottom { display:flex; align-items:center; justify-content:space-between; }
.priv-price { font-family:var(--font-title); font-size:18px; font-weight:800; color:var(--green); }
.btn-buy { padding:10px 18px; border-radius:var(--r); font-family:var(--font-title); font-size:10px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; background:linear-gradient(135deg, var(--green), #00c853); color:var(--void); box-shadow: 0 3px 12px rgba(0,230,118,0.25); transition:all 0.15s; }
.btn-buy:active { transform:scale(0.96); }

/* PROFILE */
.founder-hero { position:relative; border-radius:var(--r3); padding:2px; margin-bottom:12px; background:linear-gradient(135deg, var(--gold), var(--green), var(--blue), var(--gold)); background-size:300% 300%; animation:founderGlow 3s ease infinite; }
@keyframes founderGlow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
.founder-inner { background:var(--void2); border-radius:calc(var(--r3) - 2px); padding:20px; }
.pf-top { display:flex; align-items:center; gap:14px; margin-bottom:18px; }
.pf-ava { width:60px; height:60px; border-radius:15px; display:flex; align-items:center; justify-content:center; font-family:var(--font-title); font-size:20px; font-weight:800; flex-shrink:0; background:linear-gradient(135deg, rgba(0,230,118,0.1), rgba(0,210,255,0.08)); border:2px solid var(--green-mid); color:var(--green); box-shadow:0 0 20px var(--green-dim); }
.pf-name { font-family:var(--font-title); font-size:19px; font-weight:700; margin-bottom:3px; }
.pf-handle { font-family:var(--font-mono); font-size:11px; color:var(--blue); }
.pf-4grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.pf-cell { background:var(--void3); border-radius:12px; padding:11px 13px; }
.pf-lbl { font-family:var(--font-title); font-size:7px; letter-spacing:1.5px; text-transform:uppercase; color:var(--txt3); margin-bottom:4px; }
.pf-val { font-family:var(--font-title); font-size:20px; font-weight:800; }
.pf-val.g { color:var(--green); } .pf-val.b { color:var(--blue); } .pf-val.gold { color:var(--gold); }

.steam-form { background:var(--panel); border:1px solid var(--border); border-radius:var(--r2); padding:14px; margin-bottom:10px; margin-top:12px;}
.btn-outline { display:block; width:100%; background:transparent; color:var(--green); border:1px solid var(--green-mid); font-family:var(--font-title); font-weight:700; font-size:12px; border-radius:var(--r2); padding:11px; margin-top:8px; text-transform:uppercase; }

/* TOAST */
.toast { position:fixed; top:70px; left:50%; transform:translateX(-50%) translateY(-10px); background:var(--panel2); border:1px solid var(--border); border-radius:12px; padding:10px 18px; font-size:13px; font-weight:500; opacity:0; transition:all 0.25s; z-index:999; white-space:nowrap; pointer-events:none; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.ok { border-color:var(--green-mid); color:var(--green); }
.toast.err { border-color:rgba(255,61,90,0.3); color:var(--red); }
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="logo">FOR<span>GAMES</span>.UZ</div>
    <div class="hdr-right">
      <div class="live-badge"><div class="live-dot"></div><span id="online-count">...</span></div>
    </div>
  </div>

  <div class="content">
    
    <div class="page active" id="page-servers">
      <div class="sec-lbl">Игровые Серверы</div>
      <div id="servers-list">
        <div class="sk sk-h"></div><div class="sk sk-h"></div><div class="sk sk-h"></div>
      </div>
      <div style="text-align:center;font-size:11px;color:var(--txt3);margin-top:10px;">👆 Нажми на сервер, чтобы скопировать IP</div>
    </div>

    <div class="page" id="page-top">
      <div class="sec-lbl">Рейтинг игроков</div>
      <input class="search-input" id="search-inp" placeholder="Поиск по нику..." oninput="searchPlayers(this.value)">
      <div class="top-filters">
        <button class="top-flt active" data-sort="kills" onclick="setSort(this)">Kills</button>
        <button class="top-flt" data-sort="kd" onclick="setSort(this)">K/D</button>
        <button class="top-flt" data-sort="wins" onclick="setSort(this)">Wins</button>
        <button class="top-flt" data-sort="headshots" onclick="setSort(this)">Headshots</button>
      </div>
      <div id="top-list">
        <div class="sk sk-h"></div><div class="sk sk-h"></div><div class="sk sk-h"></div>
      </div>
    </div>

    <div class="page" id="page-shop">
      <div class="balance-hero">
        <div class="bal-left">
          <div class="bal-label">Твой баланс</div>
          <div class="bal-amount" id="shop-balance">...</div>
          <div class="bal-currency">UZS</div>
        </div>
        <button class="btn-topup" onclick="alert('Для пополнения напишите администратору @coder2406')">+ Пополнить</button>
      </div>
      <div class="sec-lbl">Привилегии</div>
      <div id="shop-items">
        <div class="sk sk-h"></div><div class="sk sk-h"></div>
      </div>
    </div>

    <div class="page" id="page-profile">
      <div id="profile-content">
        <div class="sk" style="height:220px; border-radius:20px; margin-bottom:12px;"></div>
        <div class="sk sk-h"></div>
      </div>
    </div>

  </div>

  <div class="nav">
    <div class="nav-item active" onclick="showPage('servers')">
      <div class="nav-ico">🖥️</div><div class="nav-lbl">Серверы</div>
    </div>
    <div class="nav-item" onclick="showPage('top')">
      <div class="nav-ico">🏆</div><div class="nav-lbl">Топ</div>
    </div>
    <div class="nav-item" onclick="showPage('shop')">
      <div class="nav-ico">🛒</div><div class="nav-lbl">Магазин</div>
    </div>
    <div class="nav-item" onclick="showPage('profile')">
      <div class="nav-ico">👤</div><div class="nav-lbl">Профиль</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════
// CORE JS LOGIC & API CONNECTION
// ════════════════════════════════════════════════
const API = 'https://api.forgames.uz/api'; // ТВОЙ РАБОЧИЙ API
const tg = window.Telegram?.WebApp;

if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#05070a'); }

let token = localStorage.getItem('fg_token');
let userData = JSON.parse(localStorage.getItem('fg_user') || 'null');
let currentSort = 'kills';

const $ = id => document.getElementById(id);
const fmt = n => Number(n || 0).toLocaleString('ru-RU');
const inits = s => (s || '??').slice(0, 2).toUpperCase();

// Уведомления (Toasts)
function toast(msg, type = 'ok', dur = 2800) {
  const el = $('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  setTimeout(() => el.classList.remove('show'), dur);
}

// Универсальный API Запрос
async function api(path, opts = {}) {
  const h = { 'Content-Type': 'application/json' };
  if (token) h['Authorization'] = 'Bearer ' + token;
  const r = await fetch(API + path, { headers: h, ...opts });
  return r.json();
}

// Навигация
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  
  $('page-' + name)?.classList.add('active');
  const idx = ['servers','top','shop','profile'].indexOf(name);
  if (idx >= 0) document.querySelectorAll('.nav-item')[idx]?.classList.add('active');
  
  if (name === 'servers') loadServers();
  if (name === 'top') loadTop(currentSort);
  if (name === 'shop') loadShop();
  if (name === 'profile') loadProfile();
}

// Авторизация через Telegram
async function auth() {
  let u = tg?.initDataUnsafe?.user;
  if (!u) u = { id: 999, username: 'testuser', first_name: 'Игрок' }; // Фолбек для браузера
  try {
    const d = await api('/profile/auth', {
      method: 'POST',
      body: JSON.stringify({ telegram_id: u.id, username: u.username, first_name: u.first_name })
    });
    if (d.success) {
      token = d.token;
      userData = d.user;
      localStorage.setItem('fg_token', token);
      localStorage.setItem('fg_user', JSON.stringify(d.user));
    }
  } catch(e) { console.warn('Auth error:', e); }
}

// ════════════════════════════════════════════════
// MODULES RENDER
// ════════════════════════════════════════════════

// 1. Серверы
async function loadServers() {
  try {
    const d = await api('/servers');
    const el = $('servers-list');
    if (!d.success || !d.data?.length) {
      el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--txt3);">Серверы недоступны</div>';
      return;
    }
    let total = 0;
    el.innerHTML = d.data.map(s => {
      total += s.players;
      const pct = s.maxPlayers > 0 ? (s.players / s.maxPlayers) * 100 : 0;
      const statusClass = !s.online ? 'offline' : pct >= 90 ? 'warn' : 'online';
      
      return `
      <div class="srv-card" onclick="copyIp('${s.connect}')">
        <div class="srv-dot ${statusClass}"></div>
        <div class="srv-info">
          <div class="srv-name-txt">${s.label || s.name}</div>
          <div class="srv-meta">
            <span class="srv-map-txt">${s.map}</span>
            <span class="srv-ip-txt">${s.connect}</span>
          </div>
        </div>
        <div class="srv-right">
          <div class="srv-cnt">${s.players}<span class="slash">/</span>${s.maxPlayers}</div>
          <div class="srv-mini-bar"><div class="srv-mini-fill" style="width:${Math.round(pct)}%"></div></div>
        </div>
      </div>`;
    }).join('');
    $('online-count').textContent = total + ' online';
  } catch(e) { $('servers-list').innerHTML = '<div style="text-align:center;padding:30px;color:var(--red);">Ошибка соединения</div>'; }
}

function copyIp(ip) {
  navigator.clipboard?.writeText(ip).then(() => toast('📋 ' + ip + ' скопирован!')).catch(() => toast('IP: ' + ip));
  tg?.HapticFeedback?.impactOccurred('light');
}

// 2. Топ Игроков
async function loadTop(sort) {
  currentSort = sort;
  const el = $('top-list');
  el.innerHTML = '<div class="sk sk-h"></div>'.repeat(5);
  try {
    const d = await api('/players/top?sort=' + sort + '&limit=50');
    if (!d.success || !d.data?.length) { el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--txt3);">Нет данных</div>'; return; }
    renderTop(d.data, sort);
  } catch(e) { el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--red);">Ошибка загрузки</div>'; }
}

function renderTop(players, sort) {
  const el = $('top-list');
  el.innerHTML = players.map((p, i) => {
    const rk = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
    const num = i < 3 ? ['#1','#2','#3'][i] : `#${i+1}`;
    let val = sort === 'kd' ? Number(p.kd||0).toFixed(2) : fmt(p[sort] || p.kills);
    let lbl = sort === 'headshots' ? 'HS' : sort.toUpperCase();
    
    return `
    <div class="top-row">
      <div class="tr-rank ${rk}">${num}</div>
      <div class="tr-avatar">${inits(p.name)}</div>
      <div class="tr-name">
        ${p.name}
        <div class="tr-sub">${p.server_name || 'ForGames.Uz'}</div>
      </div>
      <div class="tr-val">
        <div class="tr-num">${val}</div>
        <div class="tr-lbl">${lbl}</div>
      </div>
    </div>`;
  }).join('');
}

function setSort(el) {
  document.querySelectorAll('.top-flt').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  loadTop(el.dataset.sort);
}

let searchTimer;
async function searchPlayers(q) {
  clearTimeout(searchTimer);
  if (q.length < 2) { loadTop(currentSort); return; }
  searchTimer = setTimeout(async () => {
    try {
      const d = await api('/players/search?q=' + encodeURIComponent(q));
      if (d.success && d.data.length) renderTop(d.data, currentSort);
      else $('top-list').innerHTML = '<div style="text-align:center;padding:30px;color:var(--txt3);">Игрок не найден</div>';
    } catch(e) {}
  }, 400);
}

// 3. Магазин
async function loadShop() {
  if (!token) await auth();
  try {
    const prof = await api('/profile/me');
    if (prof.success) $('shop-balance').textContent = fmt(prof.user.balance);
    
    const d = await api('/shop/items');
    $('shop-items').innerHTML = d.data.map(item => `
      <div class="priv-card">
        <div class="priv-head">
          <div class="priv-name ${item.type === 'vip' ? 'vip-txt' : ''}">${item.name}</div>
        </div>
        <div class="priv-desc">${item.description}</div>
        <div class="priv-features">${item.perks.map(p => `<span class="priv-feat">${p}</span>`).join('')}</div>
        <div class="priv-bottom">
          <div class="priv-price">${fmt(item.price)} <span style="font-size:10px;color:var(--txt3)">UZS</span></div>
          <button class="btn-buy" onclick="buyItem(${item.id}, '${item.name}', ${item.price})">Купить</button>
        </div>
      </div>
    `).join('');
  } catch(e) {}
}

async function buyItem(id, name, price) {
  if (!confirm(`Купить ${name} за ${fmt(price)} UZS?`)) return;
  try {
    const d = await api('/shop/buy', { method: 'POST', body: JSON.stringify({ item_id: id, server_id: 0 }) });
    if (d.success) { toast('✅ Успешно!'); loadShop(); }
    else toast('❌ ' + (d.error || 'Ошибка'), 'err');
  } catch(e) { toast('Ошибка соединения', 'err'); }
}

// 4. Профиль
async function loadProfile() {
  if (!token) await auth();
  const el = $('profile-content');
  try {
    const d = await api('/profile/me');
    if (!d.success) return;
    const u = d.user, s = d.stats || {};
    
    el.innerHTML = `
      <div class="founder-hero">
        <div class="founder-inner">
          <div class="pf-top">
            <div class="pf-ava">${inits(u.first_name || u.username)}</div>
            <div>
              <div class="pf-name">${u.first_name || u.username || 'Игрок'}</div>
              <div class="pf-handle">${u.steam_id ? 'Steam: ' + u.steam_id : 'Steam не привязан'}</div>
            </div>
          </div>
          <div class="pf-4grid">
            <div class="pf-cell"><div class="pf-lbl">Убийства</div><div class="pf-val g">${fmt(s.total_kills)}</div></div>
            <div class="pf-cell"><div class="pf-lbl">K/D</div><div class="pf-val b">${Number(s.kd||0).toFixed(2)}</div></div>
            <div class="pf-cell"><div class="pf-lbl">Победы</div><div class="pf-val g">${fmt(s.total_wins)}</div></div>
            <div class="pf-cell"><div class="pf-lbl">Хедшоты</div><div class="pf-val gold">${fmt(s.total_hs)}</div></div>
          </div>
        </div>
      </div>
      
      ${!u.steam_id ? `
      <div class="steam-form">
        <label style="font-size:12px;color:var(--txt3);display:block;margin-bottom:8px;">Привяжи Steam ID для статистики</label>
        <input class="search-input" id="steam-inp" placeholder="STEAM_0:1:12345678" style="margin-bottom:0;">
        <button class="btn-outline" onclick="linkSteam()">🔗 Привязать Steam</button>
      </div>` : ''}
    `;
  } catch(e) { el.innerHTML = '<div style="text-align:center;color:var(--red);">Ошибка соединения</div>'; }
}

async function linkSteam() {
  const v = $('steam-inp')?.value.trim();
  if (!v) return toast('Введи Steam ID', 'err');
  try {
    const d = await api('/profile/steam', { method:'POST', body: JSON.stringify({ steam_id: v }) });
    if (d.success) { toast('✅ Steam привязан!'); loadProfile(); }
    else toast('❌ ' + d.error, 'err');
  } catch(e) { toast('Ошибка', 'err'); }
}

// Запуск приложения
(async () => {
  await auth();
  showPage('servers'); // Открываем страницу серверов при запуске
  setInterval(() => {
    if ($('page-servers').classList.contains('active')) loadServers();
  }, 30000); // Автообновление онлайна каждые 30 секунд
})();
</script>
