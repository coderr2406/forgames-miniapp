<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ForGames.Uz</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090b10;--bg2:#0f1219;--bg3:#161b25;--bg4:#1c2230;--bg5:#212840;
  --accent:#00e676;--accent2:#00c853;--adr:rgba(0,230,118,.12);--adb:rgba(0,230,118,.28);
  --text:#dde1ec;--text2:#7b8296;--text3:#464f63;
  --danger:#ff5252;--warn:#ffb300;--blue:#40c4ff;--gold:#ffd740;--silver:#b0bec5;--bronze:#ff8a65;
  --border:rgba(255,255,255,.06);--r:10px;--r2:14px;--r3:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden}
button{border:none;cursor:pointer;font-family:inherit}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;position:relative}

/* HEADER */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:10}
.logo{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:21px;letter-spacing:.5px;color:var(--accent)}
.logo em{color:var(--text);font-style:normal}
.header-right{display:flex;align-items:center;gap:8px}
.online-pill{display:flex;align-items:center;gap:5px;background:var(--adr);border:1px solid var(--adb);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--accent);font-family:'JetBrains Mono',monospace;font-weight:500}
.online-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.notif-btn{width:34px;height:34px;border-radius:9px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer}
.notif-badge{position:absolute;top:6px;right:6px;width:8px;height:8px;background:var(--danger);border-radius:50%;border:1.5px solid var(--bg2)}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden}
.page{display:none;padding:14px 14px 80px;animation:fadeIn .18s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* NAV */
.nav{position:absolute;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:6px 0;padding-bottom:calc(6px + env(safe-area-inset-bottom));z-index:10}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;cursor:pointer;transition:background .15s}
.nav-icon{font-size:20px;line-height:1;filter:grayscale(1);opacity:.45;transition:all .15s}
.nav-lbl{font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);transition:color .15s}
.nav-item.active .nav-icon{filter:none;opacity:1}
.nav-item.active .nav-lbl{color:var(--accent)}

/* LABELS */
.section-lbl{font-size:10px;font-weight:600;letter-spacing:1.6px;text-transform:uppercase;color:var(--text3);margin:16px 0 8px}
.section-lbl:first-child{margin-top:0}

/* SKELETON */
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-card{height:72px;border-radius:var(--r2);margin-bottom:8px}

/* SERVERS */
.server-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s,background .15s}
.server-card:active{background:var(--bg3);border-color:var(--adb)}
.srv-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:all .3s}
.srv-dot.g{background:var(--accent);box-shadow:0 0 0 4px rgba(0,230,118,.15)}
.srv-dot.y{background:var(--warn);box-shadow:0 0 0 4px rgba(255,179,0,.15)}
.srv-dot.r{background:var(--text3);box-shadow:none}
.srv-info{flex:1;min-width:0}
.srv-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.srv-meta{display:flex;align-items:center;gap:8px;margin-top:3px}
.srv-map{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--blue)}
.srv-ip{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)}
.srv-right{flex-shrink:0;text-align:right}
.srv-count{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:19px;line-height:1}
.srv-max{font-size:13px;color:var(--text3);font-weight:400}
.srv-bar{width:48px;height:3px;background:var(--bg4);border-radius:2px;margin-top:5px;overflow:hidden}
.srv-fill{height:100%;border-radius:2px;transition:width .5s}
.copy-hint{text-align:center;font-size:11px;color:var(--text3);padding:6px 0 0;display:flex;align-items:center;justify-content:center;gap:4px}

/* BUTTONS */
.btn-primary{display:block;width:100%;background:var(--accent);color:var(--bg);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;letter-spacing:.4px;border-radius:var(--r2);padding:13px;margin-top:8px;transition:background .15s,transform .1s}
.btn-primary:active{transform:scale(.98);background:var(--accent2)}
.btn-outline{display:block;width:100%;background:transparent;color:var(--accent);border:1px solid var(--adb);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;border-radius:var(--r2);padding:11px;margin-top:8px;transition:background .15s}
.btn-outline:active{background:var(--adr)}

/* TOP */
.filter-row{display:flex;gap:6px;margin-bottom:12px}
.filter-btn{flex:1;padding:7px 6px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;font-size:12px;font-weight:500;color:var(--text2);transition:all .15s}
.filter-btn.active{background:var(--adr);border-color:var(--adb);color:var(--accent);font-weight:600}
.top-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px}
.top-rank{font-family:'JetBrains Mono',monospace;font-size:13px;width:26px;text-align:center;flex-shrink:0}
.r1{color:var(--gold)}.r2{color:var(--silver)}.r3{color:var(--bronze)}.rn{color:var(--text3)}
.top-ava{width:38px;height:38px;border-radius:10px;background:var(--bg4);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;color:var(--text2);flex-shrink:0}
.top-ava.gold{border-color:rgba(255,215,64,.5);color:var(--gold)}
.top-info{flex:1;min-width:0}
.top-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-sub{font-size:11px;color:var(--text3);margin-top:1px}
.top-val{text-align:right;flex-shrink:0}
.top-num{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:19px;color:var(--accent);line-height:1}
.top-lbl{font-size:10px;color:var(--text3);margin-top:1px}

/* PROFILE */
.profile-hero{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:18px;margin-bottom:12px}
.p-head{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.p-ava{width:58px;height:58px;border-radius:14px;background:var(--bg3);border:2px solid var(--adb);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:22px;color:var(--accent);flex-shrink:0}
.p-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:22px}
.p-steam{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--blue);margin-top:3px}
.rank-pill{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;margin-top:6px}
.rank-pill.silver{background:rgba(176,190,197,.12);border:1px solid rgba(176,190,197,.3);color:var(--silver)}
.rank-pill.gold{background:rgba(255,215,64,.12);border:1px solid rgba(255,215,64,.3);color:var(--gold)}
.rank-pill.green{background:var(--adr);border:1px solid var(--adb);color:var(--accent)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-box{background:var(--bg3);border-radius:10px;padding:10px 12px}
.sbl{font-size:10px;color:var(--text3);letter-spacing:.8px;text-transform:uppercase}
.sbv{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:22px;margin-top:2px}
.sbv.g{color:var(--accent)}.sbv.b{color:var(--blue)}.sbv.y{color:var(--gold)}

/* SHOP */
.balance-card{background:var(--bg3);border:1px solid var(--adb);border-radius:var(--r2);padding:16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.bal-lbl{font-size:10px;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase}
.bal-val{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:28px;color:var(--accent);line-height:1.1}
.bal-sub{font-size:11px;color:var(--text3);margin-top:2px}
.topup-btn{background:var(--adr);border:1px solid var(--adb);border-radius:10px;padding:9px 14px;color:var(--accent);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;white-space:nowrap}
.bonus-card{background:linear-gradient(135deg,#0f2218,#0a1a10);border:1px solid rgba(0,230,118,.2);border-radius:var(--r2);padding:14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.bonus-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px}
.bonus-desc{font-size:12px;color:var(--text3);margin-top:2px}
.bonus-amount{background:var(--adr);border:1px solid var(--adb);border-radius:8px;padding:4px 10px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);font-weight:700;white-space:nowrap}
.shop-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:10px}
.shop-card.vip{border-color:rgba(255,215,64,.18)}
.shop-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.shop-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px}
.shop-name.vip{color:var(--gold)}.shop-name.premium{color:var(--accent)}
.shop-sub{font-size:11px;color:var(--text3);margin-top:2px}
.shop-price{text-align:right}
.price-val{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:20px;color:var(--accent)}
.price-lbl{font-size:10px;color:var(--text3)}
.perks{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.perk{background:var(--bg4);border-radius:6px;padding:3px 9px;font-size:11px;color:var(--text2)}

/* PRIV */
.priv-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.priv-icon{font-size:22px;flex-shrink:0}
.priv-info{flex:1}
.priv-name-txt{font-weight:600;font-size:14px}
.priv-srv{font-size:11px;color:var(--text3);margin-top:1px}
.priv-exp{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--warn);text-align:right;flex-shrink:0}

/* STEAM FORM */
.steam-form{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:10px}
.steam-form label{font-size:12px;color:var(--text3);display:block;margin-bottom:6px}
.steam-input{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;transition:border-color .15s}
.steam-input:focus{border-color:var(--adb)}
.steam-input::placeholder{color:var(--text3)}

/* TOPUP FORM */
.topup-form{background:var(--bg2);border:1px solid var(--adb);border-radius:var(--r2);padding:14px;margin-bottom:10px;display:none}
.topup-form.show{display:block}
.topup-input{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:16px;outline:none;margin-bottom:6px;transition:border-color .15s}
.topup-input:focus{border-color:var(--adb)}
.topup-hint{font-size:11px;color:var(--text3);margin-top:4px}

/* EMPTY */
.empty-state{text-align:center;padding:40px 20px}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.4}
.empty-text{color:var(--text3);font-size:14px}

/* TOAST */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--bg4);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:14px;font-weight:500;opacity:0;transition:all .25s;z-index:999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--adb);color:var(--accent)}
.toast.err{border-color:rgba(255,82,82,.3);color:var(--danger)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px}
.search-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:10px 12px 10px 36px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--adb)}
.search-input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.4}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">FOR<em>GAMES</em>.UZ</div>
    <div class="header-right">
      <div class="online-pill"><div class="online-dot"></div><span id="online-count">...</span></div>
      <div class="notif-btn"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1a5 5 0 0 0-5 5v3L1.5 11h13L13 9V6a5 5 0 0 0-5-5zM6.5 14a1.5 1.5 0 0 0 3 0" fill="#7b8296"/></svg></div>
    </div>
  </div>

  <div class="content">
    <!-- СЕРВЕРЫ -->
    <div class="page active" id="page-servers">
      <div class="section-lbl">ClanWar Серверы</div>
      <div id="servers-list">
        <div class="skeleton sk-card"></div><div class="skeleton sk-card"></div><div class="skeleton sk-card"></div>
      </div>
      <div class="copy-hint">👆 Нажми на сервер чтобы скопировать IP</div>
    </div>

    <!-- ТОП -->
    <div class="page" id="page-top">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search-inp" placeholder="Поиск по нику..." oninput="searchPlayers(this.value)">
      </div>
      <div class="filter-row">
        <button class="filter-btn active" data-sort="kills" onclick="setSort(this)">Kills</button>
        <button class="filter-btn" data-sort="kd" onclick="setSort(this)">K/D</button>
        <button class="filter-btn" data-sort="wins" onclick="setSort(this)">Wins</button>
        <button class="filter-btn" data-sort="headshots" onclick="setSort(this)">HS</button>
      </div>
      <div id="top-list"><div class="skeleton sk-card"></div><div class="skeleton sk-card"></div><div class="skeleton sk-card"></div></div>
    </div>

    <!-- МАГАЗИН -->
    <div class="page" id="page-shop">
      <div class="balance-card">
        <div>
          <div class="bal-lbl">Баланс</div>
          <div class="bal-val" id="shop-balance">… UZS</div>
          <div class="bal-sub">Пополнение через скриншот</div>
        </div>
        <button class="topup-btn" onclick="toggleTopup()">+ Пополнить</button>
      </div>

      <div class="topup-form" id="topup-form">
        <label style="font-size:12px;color:var(--text3);display:block;margin-bottom:6px">Сумма пополнения (UZS)</label>
        <input class="topup-input" id="topup-amount" type="number" placeholder="50000" min="1000">
        <div class="topup-hint">💡 После оплаты — отправь скриншот, баланс зачислим вручную</div>
        <button class="btn-primary" onclick="submitTopup()">Отправить заявку</button>
      </div>

      <div id="bonus-block"></div>

      <div class="section-lbl">Привилегии</div>
      <div id="shop-items"><div class="skeleton sk-card"></div><div class="skeleton sk-card"></div></div>
    </div>

    <!-- ПРОФИЛЬ -->
    <div class="page" id="page-profile">
      <div id="profile-content">
        <div class="skeleton" style="height:210px;border-radius:18px;margin-bottom:12px"></div>
        <div class="skeleton sk-card"></div>
      </div>
    </div>
  </div>

  <div class="nav">
    <div class="nav-item active" onclick="showPage('servers')">
      <div class="nav-icon">🖥️</div><div class="nav-lbl">Серверы</div>
    </div>
    <div class="nav-item" onclick="showPage('top')">
      <div class="nav-icon">🏆</div><div class="nav-lbl">Топ</div>
    </div>
    <div class="nav-item" onclick="showPage('shop')">
      <div class="nav-icon">🛒</div><div class="nav-lbl">Магазин</div>
    </div>
    <div class="nav-item" onclick="showPage('profile')">
      <div class="nav-icon">👤</div><div class="nav-lbl">Профиль</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── КОНФИГ ────────────────────────────────────────
const API = 'https://sleepiest-pseudotripteral-shirlee.ngrok-free.dev';
const tg  = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#0f1219'); }

let token    = localStorage.getItem('fg_token');
let userData = JSON.parse(localStorage.getItem('fg_user') || 'null');
let currentSort = 'kills';

// ── УТИЛИТЫ ──────────────────────────────────────
const $ = id => document.getElementById(id);
function toast(msg, type = 'ok', dur = 2800) {
  const el = $('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  setTimeout(() => el.classList.remove('show'), dur);
}
async function api(path, opts = {}) {
  const h = { 
    'Content-Type': 'application/json',
    'ngrok-skip-browser-warning': 'true' // <-- ДОБАВЬ ЭТУ СТРОКУ
  };
  if (token) h['Authorization'] = 'Bearer ' + token;
  const r = await fetch(API + path, { headers: h, ...opts });
  return r.json();
}
const fmt   = n => Number(n || 0).toLocaleString('ru-RU');
const inits = s => (s || '??').slice(0, 2).toUpperCase();

// ── НАВИГАЦИЯ ─────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  $('page-' + name)?.classList.add('active');
  const idx = ['servers','top','shop','profile'].indexOf(name);
  if (idx >= 0) document.querySelectorAll('.nav-item')[idx]?.classList.add('active');
  if (name === 'servers') loadServers();
  if (name === 'top')     loadTop(currentSort);
  if (name === 'shop')    loadShop();
  if (name === 'profile') loadProfile();
}

// ── АВТОРИЗАЦИЯ ───────────────────────────────────
async function auth() {
  let u = tg?.initDataUnsafe?.user;
  if (!u) u = { id: 999, username: 'testuser', first_name: 'Тест' };
  try {
    const d = await api('/api/profile/auth', {
      method: 'POST',
      body: JSON.stringify({ telegram_id: u.id, username: u.username, first_name: u.first_name })
    });
    if (d.success) {
      token = d.token;
      userData = d.user;
      localStorage.setItem('fg_token', token);
      localStorage.setItem('fg_user', JSON.stringify(d.user));
    }
  } catch(e) { console.warn('Auth error:', e); }
}

// ── СЕРВЕРЫ ───────────────────────────────────────
async function loadServers() {
  try {
    const d = await api('/api/servers');
    const el = $('servers-list');
    if (!d.success || !d.data?.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">🖥️</div><div class="empty-text">Серверы временно недоступны</div></div>';
      return;
    }
    let total = 0;
    el.innerHTML = d.data.map(s => {
      total += s.players;
      const pct  = s.maxPlayers > 0 ? s.players / s.maxPlayers : 0;
      const cls  = !s.online ? 'r' : pct >= 0.8 ? 'y' : 'g';
      const clr  = cls === 'g' ? 'var(--accent)' : cls === 'y' ? 'var(--warn)' : 'var(--text3)';
      const bclr = cls === 'y' ? 'var(--warn)' : 'var(--accent)';
      return `<div class="server-card" onclick="copyIp('${s.connect}')">
        <div class="srv-dot ${cls}"></div>
        <div class="srv-info">
          <div class="srv-name">ForGames.Uz | ${s.label}</div>
          <div class="srv-meta">
            <span class="srv-map">${s.map}</span>
            <span class="srv-ip">${s.connect}</span>
          </div>
        </div>
        <div class="srv-right">
          <div class="srv-count" style="color:${clr}">${s.players}<span class="srv-max">/${s.maxPlayers}</span></div>
          <div class="srv-bar"><div class="srv-fill" style="width:${Math.round(pct*100)}%;background:${bclr}"></div></div>
        </div>
      </div>`;
    }).join('');
    $('online-count').textContent = total + ' online';
  } catch(e) {
    $('servers-list').innerHTML = '<div class="empty-state"><div class="empty-text">Ошибка соединения</div></div>';
  }
}

function copyIp(ip) {
  navigator.clipboard?.writeText(ip).then(() => toast('📋 ' + ip + ' скопирован!')).catch(() => toast('IP: ' + ip));
  tg?.HapticFeedback?.impactOccurred('light');
}

// ── ТОП ───────────────────────────────────────────
async function loadTop(sort) {
  currentSort = sort;
  const el = $('top-list');
  el.innerHTML = '<div class="skeleton sk-card"></div>'.repeat(5);
  try {
    const d = await api('/api/players/top?sort=' + sort + '&limit=50');
    if (!d.success || !d.data?.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">🏆</div><div class="empty-text">Нет данных — статистика появится после игр</div></div>';
      return;
    }
    renderTop(d.data, sort);
  } catch(e) { el.innerHTML = '<div class="empty-state"><div class="empty-text">Ошибка загрузки</div></div>'; }
}

function renderTop(players, sort) {
  const el = $('top-list');
  const medals = ['r1','r2','r3'];
  el.innerHTML = players.map((p, i) => {
    const rk  = i < 3 ? medals[i] : 'rn';
    const num = i < 3 ? ['#1','#2','#3'][i] : `#${i+1}`;
    let val, lbl;
    if (sort === 'kd')        { val = Number(p.kd||0).toFixed(2); lbl = 'K/D'; }
    else if (sort === 'headshots') { val = fmt(p.headshots); lbl = 'HS'; }
    else                      { val = fmt(p[sort] || p.kills); lbl = sort.toUpperCase(); }
    return `<div class="top-card">
      <div class="top-rank ${rk}">${num}</div>
      <div class="top-ava ${i===0?'gold':''}">${inits(p.name)}</div>
      <div class="top-info">
        <div class="top-name">${p.name}</div>
        <div class="top-sub">${p.server_name || 'ForGames.Uz'}</div>
      </div>
      <div class="top-val"><div class="top-num">${val}</div><div class="top-lbl">${lbl}</div></div>
    </div>`;
  }).join('');
}

function setSort(el) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  loadTop(el.dataset.sort);
}

let searchTimer;
async function searchPlayers(q) {
  clearTimeout(searchTimer);
  if (q.length < 2) { loadTop(currentSort); return; }
  searchTimer = setTimeout(async () => {
    try {
      const d = await api('/api/players/search?q=' + encodeURIComponent(q));
      if (d.success && d.data.length) renderTop(d.data, currentSort);
      else $('top-list').innerHTML = '<div class="empty-state"><div class="empty-text">Игрок не найден</div></div>';
    } catch(e) {}
  }, 400);
}

// ── МАГАЗИН ───────────────────────────────────────
async function loadShop() {
  if (!token) await auth();
  try {
    const prof = await api('/api/profile/me');
    if (prof.success) {
      $('shop-balance').textContent = fmt(prof.user.balance) + ' UZS';
      const bb = $('bonus-block');
      if (!prof.user.bonus_taken) {
        bb.innerHTML = `<div class="bonus-card">
          <div><div class="bonus-title">🎁 Стартовый бонус</div><div class="bonus-desc">Одноразовый подарок новым игрокам</div></div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            <div class="bonus-amount">+10 000 UZS</div>
            <button class="btn-primary" style="padding:7px 14px;font-size:13px;margin:0;border-radius:9px" onclick="claimBonus()">Получить</button>
          </div>
        </div>`;
      } else {
        bb.innerHTML = '';
      }
    }
  } catch(e) {}

  try {
    const d = await api('/api/shop/items');
    const el = $('shop-items');
    el.innerHTML = d.data.map(item => `
      <div class="shop-card ${item.type}">
        <div class="shop-top">
          <div>
            <div class="shop-name ${item.type}">${item.name}</div>
            <div class="shop-sub">${item.description}</div>
          </div>
          <div class="shop-price">
            <div class="price-val">${fmt(item.price)}</div>
            <div class="price-lbl">UZS</div>
          </div>
        </div>
        <div class="perks">${item.perks.map(p=>`<span class="perk">${p}</span>`).join('')}</div>
        <button class="btn-primary" onclick="buyItem(${item.id},'${item.name}',${item.price})">Купить ${item.name}</button>
      </div>
    `).join('');
  } catch(e) {}
}

function toggleTopup() {
  const f = $('topup-form');
  f.classList.toggle('show');
  if (f.classList.contains('show')) $('topup-amount').focus();
}

async function submitTopup() {
  const amount = parseInt($('topup-amount').value);
  if (!amount || amount < 1000) return toast('Минимум 1 000 UZS', 'err');
  try {
    const d = await api('/api/shop/topup', {
      method: 'POST',
      body: JSON.stringify({ amount, username: userData?.username || 'user' })
    });
    if (d.success) {
      toast('✅ Заявка отправлена! Ожидай зачисления');
      $('topup-form').classList.remove('show');
      $('topup-amount').value = '';
    } else {
      toast('❌ ' + (d.error || 'Ошибка'), 'err');
    }
  } catch(e) { toast('Ошибка соединения', 'err'); }
}

async function claimBonus() {
  if (!token) await auth();
  try {
    const d = await api('/api/profile/bonus', { method: 'POST' });
    if (d.success) { toast('🎉 +10,000 UZS зачислено!'); loadShop(); }
    else toast('❌ ' + d.error, 'err');
  } catch(e) { toast('Ошибка', 'err'); }
}

async function buyItem(id, name, price) {
  if (!token) await auth();
  const bal = parseInt($('shop-balance').textContent) || 0;
  if (!confirm(`Купить ${name} за ${fmt(price)} UZS?`)) return;
  try {
    const d = await api('/api/shop/buy', { method: 'POST', body: JSON.stringify({ item_id: id, server_id: 0 }) });
    if (d.success) {
      toast('✅ ' + d.message);
      tg?.HapticFeedback?.notificationOccurred('success');
      loadShop();
    } else {
      toast('❌ ' + (d.error || 'Ошибка'), 'err');
    }
  } catch(e) { toast('Ошибка соединения', 'err'); }
}

// ── ПРОФИЛЬ ───────────────────────────────────────
async function loadProfile() {
  if (!token) await auth();
  const el = $('profile-content');
  try {
    const d = await api('/api/profile/me');
    if (!d.success) { el.innerHTML = '<div class="empty-state"><div class="empty-text">Ошибка загрузки</div></div>'; return; }
    const u = d.user, s = d.stats || {}, privs = d.privileges || [];
    const rankClass = ['Золото','Мастер'].includes(u.rank) ? 'gold' : ['Новичок'].includes(u.rank) ? 'green' : 'silver';

    el.innerHTML = `
      <div class="profile-hero">
        <div class="p-head">
          <div class="p-ava">${inits(u.first_name || u.username)}</div>
          <div>
            <div class="p-name">${u.first_name || u.username || 'Игрок'}</div>
            ${u.steam_id ? `<div class="p-steam">${u.steam_id}</div>` : '<div class="p-steam" style="color:var(--text3)">Steam не привязан</div>'}
            <div class="rank-pill ${rankClass}">⭐ ${u.rank}</div>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-box"><div class="sbl">Убийства</div><div class="sbv g">${fmt(s.total_kills)}</div></div>
          <div class="stat-box"><div class="sbl">K/D</div><div class="sbv b">${Number(s.kd||0).toFixed(2)}</div></div>
          <div class="stat-box"><div class="sbl">Победы</div><div class="sbv g">${fmt(s.total_wins)}</div></div>
          <div class="stat-box"><div class="sbl">Хедшоты</div><div class="sbv y">${fmt(s.total_hs)}</div></div>
        </div>
      </div>

      <div class="balance-card">
        <div>
          <div class="bal-lbl">Баланс</div>
          <div class="bal-val">${fmt(u.balance)} UZS</div>
        </div>
        <button class="topup-btn" onclick="showPage('shop')">В магазин →</button>
      </div>

      ${!u.steam_id ? `<div class="steam-form">
        <label>Привяжи Steam ID для отображения статистики</label>
        <input class="steam-input" id="steam-inp" placeholder="STEAM_0:1:12345678">
        <button class="btn-outline" style="margin-top:8px" onclick="linkSteam()">🔗 Привязать Steam</button>
      </div>` : ''}

      <div class="section-lbl">Мои привилегии</div>
      ${privs.length ? privs.map(p => {
        const days = Math.ceil((new Date(p.expires_at) - Date.now()) / 86400000);
        return `<div class="priv-card">
          <div class="priv-icon">${p.type==='vip'?'⭐':'💎'}</div>
          <div class="priv-info">
            <div class="priv-name-txt">${p.name}</div>
            <div class="priv-srv">${p.server_name||'Все серверы'}</div>
          </div>
          <div class="priv-exp">${days} дн.</div>
        </div>`;
      }).join('') : '<div class="empty-state"><div class="empty-icon">🔑</div><div class="empty-text">Нет активных привилегий</div></div>'}
    `;
  } catch(e) {
    el.innerHTML = '<div class="empty-state"><div class="empty-text">Ошибка соединения с сервером</div></div>';
  }
}

async function linkSteam() {
  const v = $('steam-inp')?.value.trim();
  if (!v) return toast('Введи Steam ID', 'err');
  try {
    const d = await api('/api/profile/steam', { method:'POST', body: JSON.stringify({ steam_id: v }) });
    if (d.success) { toast('✅ Steam привязан!'); loadProfile(); }
    else toast('❌ ' + d.error, 'err');
  } catch(e) { toast('Ошибка', 'err'); }
}

// ── СТАРТ ─────────────────────────────────────────
(async () => {
  await auth();
  loadServers();
  setInterval(() => {
    if ($('page-servers')?.classList.contains('active')) loadServers();
  }, 30000);
})();
</script>
</body>
